<script>
    // ==========================================
    // 1. GLOBAL VARIABLES & NAVIGATION
    // ==========================================
    var CACHED_OPTIONS = null;
    var summaryPieChart = null;
    var summaryBarChart = null;
    var CURRENT_DD_DATA = null;
    var LOAN_DATA_CACHE = []; // เก็บข้อมูลทั้งหมดไว้กรองหน้าบ้าน
    var TX_DATA_CACHE = []; // เก็บข้อมูลทั้งหมดไว้กรองหน้าบ้านของ Transactions

    function switchPage(pageId, element) {
        $('.page-section').addClass('d-none');
        $('#' + pageId + '-page').removeClass('d-none');
        $('.nav-pill-btn').removeClass('active');
        if (element) $(element).addClass('active');

        // Trigger Page Logic
        if (pageId === 'transaction') { loadTxHistory(); } //หน้าเบิกจ่าย
        if (pageId === 'loan') { document.getElementById('loanDate').valueAsDate = new Date(); loadLoanHistory(); } //หน้ายืมเงิน
        if (pageId === 'yearly') initYearlyPage(); //หน้าแผนงานประจำปี
        if (pageId === 'summary') { loadSummary(); } //Executive Summary
        if (pageId === 'dashboard') { loadDashboardData(); } //หน้า Dashboard
        if (pageId === 'allocation') { initAllocPage(); } //หน้าจัดสรรงบประมาณ
    }

    // ==========================================
    // 2. INITIALIZATION (SAFETY FIRST METHOD)
    // ==========================================
    $(document).ready(function () {
        console.log("System Initializing...");

        // A. โหลดข้อมูลตั้งต้น
        refreshMasterData();
        loadDashboardData();

        // B. SETUP SELECT2 : GROUP 1 (Transaction Modal)
        $('#txOrder').select2({
            theme: 'bootstrap-5', placeholder: '-- เลือกลำดับ --', allowClear: true,
            dropdownParent: $('#txModal')
        });

        $('#txProject').select2({
            theme: 'bootstrap-5', placeholder: '-- เลือกโครงการ --', allowClear: true,
            dropdownParent: $('#txModal'),
            templateResult: formatState, templateSelection: formatState
        });
        $('#txProject').on('change select2:select', function (e) { onTxProjectChange(); });

        $('#txActivity').select2({
            theme: 'bootstrap-5', placeholder: '-- เลือกกิจกรรม --', allowClear: true,
            dropdownParent: $('#txModal')
        });
        var wrapTemplateTx = {
            theme: 'bootstrap-5', placeholder: '-- เลือกกิจกรรมย่อย --', allowClear: true,
            dropdownParent: $('#txModal'),
            templateResult: formatState, templateSelection: formatState
        };
        $('#txSubActivity').select2(wrapTemplateTx);

        // C. SETUP SELECT2 : GROUP 2 (Loan Modal)
        $('#loanOrder').select2({
            theme: 'bootstrap-5', placeholder: '-- เลือกลำดับ --', allowClear: true,
            dropdownParent: $('#loanModal')
        });
        $('#loanActivity').select2({
            theme: 'bootstrap-5', placeholder: '-- เลือกกิจกรรม --', allowClear: true,
            dropdownParent: $('#loanModal')
        });
        var wrapTemplateLoan = {
            theme: 'bootstrap-5', placeholder: '-- เลือกกิจกรรมย่อย --', allowClear: true,
            dropdownParent: $('#loanModal'),
            templateResult: formatState, templateSelection: formatState
        };
        $('#loanSubActivity').select2(wrapTemplateLoan);

        // D. SETUP SELECT2 : GROUP 3 (Search Filters)
        // ------------------------------------------------
        var searchIds = ['#searchTxOrder', '#searchLoanAct', '#searchTxAct', '#searchTxProj', '#searchDeptSelect', '#yearlyDeptSelect', '#searchLoanSub', '#searchTxSub'];

        // ตั้งค่า Template การแสดงผล (ให้ตัดคำยาวๆ ลงบรรทัดใหม่)
        var searchTemplate = {
            theme: 'bootstrap-5',
            placeholder: 'เลือกข้อมูล...',
            allowClear: true,
            templateResult: formatState,     // ✅ ใช้ฟังก์ชันตัดคำ
            templateSelection: formatState   // ✅ ใช้ฟังก์ชันตัดคำตอนเลือกแล้วด้วย
        };

        // Apply ให้ตัวทั่วไป
        searchIds.forEach(function (id) {
            $(id).select2(searchTemplate);
        });

        // Apply ให้ตัวค้นหา Loan (Search Filters)
        $('#searchLoanOrder').select2($.extend({}, searchTemplate, { placeholder: '🔍 ระบุลำดับ...' }));
        $('#searchLoanProj').select2($.extend({}, searchTemplate, { placeholder: 'พิมพ์ชื่อโครงการเพื่อค้นหา...' }));

        // Apply ให้ตัวค้นหา Transaction (Search Filters)
        $('#searchTxOrder').select2($.extend({}, searchTemplate, { placeholder: '🔍 ระบุลำดับ...' }));
        $('#searchTxProj').select2($.extend({}, searchTemplate, { placeholder: 'พิมพ์ชื่อโครงการเพื่อค้นหา...' }));

        // E. EVENT LISTENERS
        // Transaction Events
        $('#txOrder').on('change select2:select', function (e) { onTxOrderChange(); });
        $('#txOrder').on('select2:clear', function (e) { clearTxForm(); });
        $('#txActivity').on('change select2:select', function (e) { onTxActivityChange(); });

        // Loan Events
        $('#loanOrder').on('select2:select', function (e) { onLoanOrderChange(); });
        $('#loanOrder').on('select2:clear', function (e) { clearLoanForm(); });
        $('#loanActivity').off('select2:select').on('select2:select', function (e) { onLoanActivityChange(); });

        // Cascading Search Events
        $('#searchLoanOrder').on('select2:select', function (e) { onCascadingChange('searchLoan', 'order'); });
        $('#searchLoanProj').on('select2:select', function (e) { onCascadingChange('searchLoan', 'proj'); });
        $('#searchLoanAct').on('select2:select', function (e) { onCascadingChange('searchLoan', 'act'); });
        $('#searchTxOrder').on('select2:select', function (e) { onCascadingChange('searchTx', 'order'); });
        $('#searchTxProj').on('select2:select', function (e) { onCascadingChange('searchTx', 'proj'); });
        $('#searchTxAct').on('select2:select', function (e) { onCascadingChange('searchTx', 'act'); });

        // Back to Top
        let mybutton = document.getElementById("btn-back-to-top");
        if (mybutton) {
            window.onscroll = function () { if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) { mybutton.style.display = "block"; } else { mybutton.style.display = "none"; } };
            mybutton.addEventListener("click", function () { window.scrollTo({ top: 0, behavior: 'smooth' }); });
        }
    });

    // Helper for Select2 Template
    function formatState(data) {
        if (!data.id) { return data.text; }
        return $('<div style="white-space: normal; word-wrap: break-word; line-height: 1.5; padding: 3px 0;">' + data.text + '</div>');
    }

    // ==========================================
    // 3. MASTER DATA LOADER
    // ==========================================
    function refreshMasterData() {
        google.script.run.withSuccessHandler(function (data) {
            CACHED_OPTIONS = data || [];
            populateInitDropdowns();
        }).getAllMasterDataForClient();
    }

    function populateInitDropdowns() {
        if (!CACHED_OPTIONS) return;
        var orders = [...new Set(CACHED_OPTIONS.map(r => r.order).filter(o => o != "" && o != null))].sort((a, b) => a - b);
        ['#txOrder', '#loanOrder', '#searchLoanOrder', '#searchTxOrder'].forEach(sel => {
            var $s = $(sel); $s.empty().append('<option value="">-- เลือกลำดับ --</option>');
            orders.forEach(o => $s.append(`<option value="${o}">${o}</option>`));
        });

        var depts = [...new Set(CACHED_OPTIONS.map(r => r.dept).filter(Boolean))].sort();
        ['#searchDeptSelect', '#yearlyDeptSelect', '#sumDept'].forEach(sel => {
            var $s = $(sel); $s.empty().append('<option value="">-- แสดงทั้งหมด --</option>');
            depts.forEach(d => $s.append(`<option value="${d}">${d}</option>`));
        });

        // 🎯 ดึงแหล่งงบประมาณจาก CACHED_OPTIONS มาใส่ #sumSource
        var sources = [...new Set(CACHED_OPTIONS.map(r => r.budgetSource || r.source).filter(Boolean))].sort();
        var $src = $('#sumSource').empty().append('<option value="">-- แสดงทั้งหมด --</option>');
        sources.forEach(s => $src.append(`<option value="${s}">${s}</option>`));

        // 🎯 ตั้งค่า Default ให้เป็น "เงินบำรุง สสจ.เลย" 
        $('#sumSource').val('เงินบำรุง สสจ.เลย');

        // 🎯 สั่งดึงประเภทงบจากชีต c_budget_type
        google.script.run.withSuccessHandler(function (res) {
            var $type = $('#sumType').empty().append('<option value="">-- แสดงทั้งหมด --</option>');
            if (res.types) {
                res.types.forEach(t => $type.append(`<option value="${t}">${t}</option>`));
            }
            // 🎯 ตั้งค่า Default ให้เป็น "เงินนอก สป." ทันทีที่โหลด Dropdown เสร็จ
            $('#sumType').val('เงินนอก สป.');
        }).getModalDropdownData();

        // แปลง Dropdown ให้เป็น Select2 เพื่อให้ค้นหาได้
        $('#sumSource, #sumDept').select2({ theme: 'bootstrap-5', width: '100%' });
    }

    // ==========================================
    // 4. DASHBOARD LOGIC
    // ==========================================
    function loadDashboardData() {
        $('#moph-approved').html('<i class="fas fa-spinner fa-spin"></i>');
        google.script.run.withSuccessHandler(renderDashboard).getDashboardData();
    }

    function renderDashboard(data) {
        // 🔄 ซ่อน Loading Overlay เมื่อข้อมูลโหลดเสร็จ
        var overlay = document.getElementById('app-loading-overlay');
        if (overlay) {
            overlay.classList.add('fade-out');
            setTimeout(function () { overlay.remove(); }, 600);
        }

        if (!data || data.error) {
            $('#moph-approved').html('<span class="text-danger small">' + (data ? data.error : "Error") + '</span>');
            return;
        }
        // 1. MOPH
        updateCards('moph', data.moph);
        renderGauge('mophGauge', data.moph);
        renderBarChart('mophBar', data.moph.deptStats, '#198754');

        // 2. Loei Fund (แทนที่ NonMOPH เดิม)
        updateCards('nonmoph', data.loeiFund);
        renderGauge('nonMophGauge', data.loeiFund);
        // 🎯 ส่งเลข 10 ไปท้ายสุด เพื่อจำกัดแค่ 10 กลุ่มงาน
        renderBarChart('nonMophBar', data.loeiFund.deptStats, '#0d6efd', 10);
    }

    // 🎯 แก้ไขเพิ่มการรับค่า limit
    function renderBarChart(canvasId, deptStats, colorTheme, limit) {
        var chartData = [];
        for (var dept in deptStats) {
            var alloc = deptStats[dept].allocated;
            var spent = deptStats[dept].spent;
            var pct = alloc > 0 ? (spent / alloc) * 100 : 0;
            if (alloc > 0) chartData.push({ label: dept, y: pct });
        }

        // เรียงจากมากไปน้อย
        chartData.sort((a, b) => b.y - a.y);

        // 🎯 หั่นเอาเฉพาะ Top 10 (ถ้ามีการส่งค่ามา)
        if (limit && limit > 0) {
            chartData = chartData.slice(0, limit);
        }

        var ctx = document.getElementById(canvasId);
        if (ctx) {
            var chartStatus = Chart.getChart(canvasId);
            if (chartStatus != undefined) { chartStatus.destroy(); }
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: chartData.map(d => d.label),
                    datasets: [{ data: chartData.map(d => d.y), backgroundColor: colorTheme, borderRadius: 4, barPercentage: 0.6 }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'x',
                    plugins: { legend: { display: false }, tooltip: { callbacks: { label: (c) => c.raw.toFixed(2) + '%' } } },
                    scales: { y: { beginAtZero: true, max: 100, ticks: { callback: (v) => v + "%" } }, x: { grid: { display: false } } }
                }
            });
        }
    }

    function updateCards(prefix, stats) {
        var fmt = (num) => Number(num).toLocaleString(undefined, { minimumFractionDigits: 2 });
        $('#' + prefix + '-approved').text(fmt(stats.approved));
        $('#' + prefix + '-allocated').text(fmt(stats.allocated));
        $('#' + prefix + '-spent').text(fmt(stats.spent));
        $('#' + prefix + '-balance').text(fmt(stats.balance));
    }

    function renderGauge(canvasId, stats) {
        var alloc = stats.allocated || 0; var spent = stats.spent || 0;
        var percent = alloc > 0 ? (spent / alloc) * 100 : 0;
        $('#' + canvasId + 'Text').text(percent.toFixed(2) + '%');
        var ctx = document.getElementById(canvasId);
        if (ctx) {
            var chartStatus = Chart.getChart(canvasId);
            if (chartStatus != undefined) { chartStatus.destroy(); }
            new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['เบิกจ่าย', 'คงเหลือ'], datasets: [{ data: [percent, 100 - percent], backgroundColor: ['#dc3545', '#e9ecef'], borderWidth: 0, hoverOffset: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, rotation: -90, circumference: 180, cutout: '80%', plugins: { legend: { display: false }, tooltip: { enabled: false } } }
            });
        }
    }

    // ==========================================
    // 5. TRANSACTION LOGIC (Fixed Cascading)
    // ==========================================

    function clearTxForm() {
        $('#txProject').empty().append('<option value="">-- เลือกโครงการ --</option>').trigger('change').prop('disabled', true);
        $('#txActivity').empty().append('<option value="">-- เลือกกิจกรรม --</option>').trigger('change').prop('disabled', true);
        $('#txSubActivity').empty().append('<option value="">-- เลือกกิจกรรมย่อย --</option>').trigger('change').prop('disabled', true);
        $('#divTxSubActivity').addClass('d-none');
        $('#txInfoBox').addClass('d-none');
    }

    function onTxOrderChange() {
        var order = $('#txOrder').val();
        var projSel = $('#txProject').empty().append('<option value="">-- เลือกโครงการ --</option>');

        $('#txActivity').empty().append('<option value="">-- เลือกกิจกรรม --</option>').trigger('change').prop('disabled', true);
        $('#txSubActivity').empty().append('<option value="">-- เลือกกิจกรรมย่อย --</option>').trigger('change').prop('disabled', true);
        $('#divTxSubActivity').addClass('d-none');
        $('#txInfoBox').addClass('d-none');

        if (!order) {
            projSel.trigger('change').prop('disabled', true);
            return;
        }

        var rows = CACHED_OPTIONS.filter(r => String(r.order) === String(order));
        if (rows.length > 0) {
            var projects = [...new Set(rows.map(r => r.project))].sort();
            projects.forEach(p => { projSel.append(new Option(p, p)); });
            projSel.trigger('change').prop('disabled', false);
        }
    }

    function onTxProjectChange() {
        var order = $('#txOrder').val();
        var proj = $('#txProject').val();
        var actSel = $('#txActivity').empty().append('<option value="">-- เลือกกิจกรรม --</option>');

        $('#txSubActivity').empty().append('<option value="">-- เลือกกิจกรรมย่อย --</option>').trigger('change').prop('disabled', true);
        $('#divTxSubActivity').addClass('d-none');
        $('#txInfoBox').addClass('d-none');

        if (!proj) {
            actSel.trigger('change').prop('disabled', true);
            return;
        }

        var rows = CACHED_OPTIONS.filter(r => String(r.order) === String(order) && r.project === proj);
        if (rows.length > 0) {
            var activities = [...new Set(rows.map(r => r.activity))].sort();
            activities.forEach(a => { actSel.append(new Option(a, a)); });
            actSel.trigger('change').prop('disabled', false);
        }
    }

    function onTxActivityChange() {
        var order = $('#txOrder').val();
        var proj = $('#txProject').val();
        var act = $('#txActivity').val();
        var subSel = $('#txSubActivity').empty().append('<option value="">-- เลือกกิจกรรมย่อย --</option>');

        $('#divTxSubActivity').addClass('d-none');
        $('#txInfoBox').addClass('d-none');

        if (!act) return;

        var rows = CACHED_OPTIONS.filter(r => String(r.order) === String(order) && r.project === proj && r.activity === act);
        var subActivities = [...new Set(rows.map(r => r.subActivity).filter(s => s && String(s).trim() !== ""))].sort();

        if (subActivities.length > 0) {
            subActivities.forEach(sub => { subSel.append(new Option(sub, sub)); });
            $('#divTxSubActivity').removeClass('d-none');
            subSel.prop('disabled', false);
        } else {
            showTxBudgetInfo(); // ถ้าไม่มีกิจกรรมย่อย ให้โชว์ InfoBox ทันที
        }
    }

    function showTxBudgetInfo() {
        var order = $('#txOrder').val();
        var proj = $('#txProject').val();
        var act = $('#txActivity').val();
        var sub = $('#txSubActivity').val();

        // ค้นหาแถว Master ที่ตรงกับเงื่อนไขทั้งหมด
        var row = CACHED_OPTIONS.find(r =>
            String(r.order) === String(order) &&
            r.project === proj &&
            r.activity === act &&
            (sub ? r.subActivity === sub : true)
        );

        if (row) {
            $('#tx_disp_dept').text(row.dept); // แสดงกลุ่มงาน
            $('#tx_disp_proj').text(row.project);

            $('#tx_alloc').text(Number(row.allocated).toLocaleString());
            var pct = (row.allocated > 0) ? (row.balance / row.allocated * 100) : 0;
            var colorClass = (pct < 20) ? 'text-danger' : (pct < 50 ? 'text-success' : 'text-primary');
            $('#tx_bal').text(Number(row.balance).toLocaleString()).removeClass('text-primary text-danger text-success text-warning').addClass(colorClass);

            $('#txInfoBox').attr('data-id', row.id).removeClass('d-none');
        }
    }

    function openEditTxModal(rowId, dateStr, amount, desc, projectName, projectId) {
        $('#editRowId').val(rowId);
        $('#editProjectId').val(projectId); // รหัสโครงการสำคัญมากสำหรับการคำนวณ Master
        $('#editOldAmount').val(amount);    // เก็บยอดเก่าไว้หักลบ

        $('#editDesc').val(desc);
        $('#editAmount').val(amount);
        $('#editReason').val(''); // ล้างเหตุผล

        // แปลงวันที่ไทย/Format อื่น ให้เป็น YYYY-MM-DD เพื่อใส่ใน Input Date
        // (สมมติว่า dateStr มาเป็น text ถ้า format ไม่ตรงอาจต้องเขียน function แปลง)
        // เบื้องต้นลองกำหนดค่าว่างเพื่อให้ user เลือกใหม่ หรือถ้า dateStr เป็น YYYY-MM-DD อยู่แล้วก็ใส่ได้เลย
        // $('#editDate').val(dateStr); 
        document.getElementById('editDate').valueAsDate = new Date(); // default วันนี้ไปก่อน

        var myModal = new bootstrap.Modal(document.getElementById('modalEditTx'));
        myModal.show();
    }

    // 2. บันทึกการแก้ไข
    function submitEditTx(e) {
        e.preventDefault();

        var rowId = $('#editRowId').val();
        var projectId = $('#editProjectId').val();
        var oldAmount = $('#editOldAmount').val();
        var newAmount = $('#editAmount').val();
        var newDate = $('#editDate').val();
        var newDesc = $('#editDesc').val();
        var reason = $('#editReason').val();

        Swal.fire({
            title: 'ยืนยันการแก้ไข?',
            text: "ระบบจะคำนวณยอดเงินใน Master ใหม่ทันที",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ffc107',
            confirmButtonText: 'ใช่, บันทึกเลย',
            cancelButtonText: 'ยกเลิก'
        }).then((result) => {
            if (result.isConfirmed) {
                Swal.fire({ title: 'กำลังประมวลผล...', didOpen: () => Swal.showLoading() });

                google.script.run
                    .withSuccessHandler(function (res) {
                        Swal.close();
                        if (res.status === 'success') {
                            Swal.fire('สำเร็จ', 'แก้ไขข้อมูลเรียบร้อย', 'success');
                            $('#modalEditTx').modal('hide');
                            // Refresh ตาราง
                            loadTxHistory();
                            refreshMasterData();
                            loadDashboardData();
                        } else {
                            Swal.fire('Error', res.message, 'error');
                        }
                    })
                    .editTransaction({
                        rowId: rowId,
                        projectId: projectId,
                        oldAmount: oldAmount,
                        newAmount: newAmount,
                        date: newDate,
                        desc: newDesc,
                        reason: reason
                    });
            }
        });
    }


    function confirmTxAction(action, rowId, projectId, amount) {
        if (action === 'delete') {
            Swal.fire({
                title: 'ยืนยันการลบ?',
                text: `ระบบจะลบข้อมูลและคืนเงิน ${Number(amount).toLocaleString()} บาท กลับเข้าโครงการ ใช่หรือไม่?`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc3545',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'ใช่, ยืนยันการลบ',
                cancelButtonText: 'ยกเลิก'
            }).then((res) => {
                if (res.isConfirmed) {
                    Swal.fire({ title: 'กำลังลบข้อมูล...', didOpen: () => Swal.showLoading() });

                    // 🚀 สั่งหลังบ้านให้ลบข้อมูลจริง
                    google.script.run
                        .withSuccessHandler(function (res) {
                            if (res.status === 'success') {
                                Swal.fire({ icon: 'success', title: 'สำเร็จ', text: res.message, timer: 1500, showConfirmButton: false });
                                // โหลดข้อมูลตารางและอัปเดต Dashboard ใหม่ทั้งหมด
                                loadTxHistory();
                                refreshMasterData();
                                loadDashboardData();
                            } else {
                                Swal.fire('เกิดข้อผิดพลาด', res.message, 'error');
                            }
                        })
                        .deleteTransaction(rowId, projectId, amount); // ส่งพารามิเตอร์ 3 ตัว
                }
            });
        }
    }

    function submitTransaction() {
        var amount = parseFloat($('#txAmount').val());
        if (!amount) { Swal.fire('เตือน', 'กรุณาระบุจำนวนเงิน', 'warning'); return; }
        var projectId = $('#txInfoBox').attr('data-id');
        if (!projectId) { Swal.fire('เตือน', 'กรุณาเลือกโครงการ', 'warning'); return; }

        var formData = {
            projectId: projectId,
            dept: $('#tx_disp_dept').text(),
            project: $('#tx_disp_proj').text(),
            activity: $('#txActivity').val(),
            txDate: $('#txDate').val(),
            amount: amount,

    function runTxSearch() {

    // 🛠️ [แก้ไข] ฟังก์ชัน onLoanOrderChange : แก้ปัญหาเลือกแล้วกิจกรรมไม่ขึ้น
    function onLoanOrderChange() {
        var order = $('#loanOrder').val();
        var select = $('#loanActivity').empty().append('<option value="">-- เลือกกิจกรรม --</option>');

        // Reset ช่องอื่นๆ
        $('#divLoanSubActivity').addClass('d-none');
        $('#loanSubActivity').empty();
        $('#loanInfoBox').addClass('d-none');

        if (!order) {
            select.trigger('change').prop('disabled', true);
            return;
        }

        // กรองข้อมูลจาก CACHED_OPTIONS
        var rows = CACHED_OPTIONS.filter(r => String(r.order) === String(order));

        if (rows.length > 0) {
            // 1. แสดง Info Box ทันที
            updateLoanInfoBox(rows[0]);

            // 2. ดึงกิจกรรม (Activities) มาใส่ Dropdown
            var activities = [...new Set(rows.map(r => r.activity).filter(a => a))].sort();
            activities.forEach(act => {
                // ใช้ new Option เพื่อป้องกันปัญหาตัวอักษรพิเศษ
                select.append(new Option(act, act));
            });

            // 3. ปลดล็อก Dropdown
            select.trigger('change').prop('disabled', false);
        }
    }

    function onLoanActivityChange() {
        var order = $('#loanOrder').val();
        var actName = $('#loanActivity').val();
        var subSelect = $('#loanSubActivity').empty().append('<option value="">-- เลือกกิจกรรมย่อย --</option>');
        $('#divLoanSubActivity').addClass('d-none');

        if (!actName) return;

        var rows = CACHED_OPTIONS.filter(r => String(r.order) === String(order) && r.activity === actName);
        var subActivities = rows.filter(r => r.subActivity).map(r => r.subActivity);

        if (subActivities.length > 0) {
            subActivities.forEach(sub => {
                var row = rows.find(r => r.subActivity === sub);
                var option = new Option(sub, sub);
                $(option).data('row', row);
                subSelect.append(option);
            });
            $('#divLoanSubActivity').removeClass('d-none');
        } else {
            if (rows[0]) updateLoanInfoBox(rows[0]);
        }
    }

    function renderSummaryPage(data) {
        if (data.error) { Swal.fire('Error', data.error, 'error'); return; }
        var fmt = (n) => Number(n).toLocaleString(undefined, { minimumFractionDigits: 2 });

        $('#s-total-alloc').text(fmt(data.grandTotal.allocated));
        $('#s-total-spent').text(fmt(data.grandTotal.spent));
        $('#s-total-bal').text(fmt(data.grandTotal.balance));

        var pct = (data.grandTotal.allocated > 0) ? (data.grandTotal.spent / data.grandTotal.allocated * 100) : 0;
        $('#s-total-pct').text(pct.toFixed(2) + '%');

        // สั่งวาดกราฟ
        renderSummaryCharts(data);

        // 🎯 วาดตาราง 6 หมวดหมู่แบบ Fix ลำดับ พร้อมแถวผลรวม
        var tSource = $('#tableSourceBody').empty();
        var totalAlloc = 0;
        var totalSpent = 0;

        var orderKeys = [
            'สป.สธ.', 'เงิน นอก สป.', 'เงินบำรุง สสจ.เลย',
            'เงินบำรุง HRD', 'งบพัฒนากลุ่มจังหวัด', 'งบพัฒนาจังหวัด'
        ];

        orderKeys.forEach(k => {
            // ดัก Error กรณีหลังบ้านส่งตัวแปรมาไม่ครบ
            if (!data.customSourceTable || !data.customSourceTable[k]) return;

            var alloc = data.customSourceTable[k].allocated;
            var spent = data.customSourceTable[k].spent;
            var bal = alloc - spent;
            var p = (alloc > 0) ? (spent / alloc * 100) : 0;

            totalAlloc += alloc;
            totalSpent += spent;

            var pColor = (p >= 80) ? 'bg-success' : (p >= 50 ? 'bg-warning text-dark' : 'bg-danger');
            var balColor = (bal < 0) ? 'text-danger' : 'text-success';

            tSource.append(`
                <tr>
                    <td class="ps-4 fw-bold text-dark">${k}</td>
                    <td class="text-end text-primary fw-bold">${fmt(alloc)}</td>
                    <td class="text-end text-danger fw-bold">${fmt(spent)}</td>
                    <td class="text-end fw-bold ${balColor}">${fmt(bal)}</td>
                    <td class="align-middle px-3">
                        <div class="progress" style="height: 20px; background-color: #e9ecef;">
                            <div class="progress-bar ${pColor}" role="progressbar" style="width: ${p}%">${p.toFixed(2)}%</div>
                        </div>
                    </td>
                </tr>
            `);
        });

        // 🎯 เพิ่มแถว "รวมทั้งสิ้น" ไว้ล่างสุด
        var tBal = totalAlloc - totalSpent;
        var tP = (totalAlloc > 0) ? (totalSpent / totalAlloc * 100) : 0;
        var tPColor = (tP >= 80) ? 'bg-success' : (tP >= 50 ? 'bg-warning text-dark' : 'bg-danger');
        var tBalColor = (tBal < 0) ? 'text-danger' : 'text-success';

        tSource.append(`
            <tr class="table-secondary border-top border-2 border-secondary">
                <td class="ps-4 fw-bold text-dark">รวมทั้งสิ้น</td>
                <td class="text-end text-primary fw-bold">${fmt(totalAlloc)}</td>
                <td class="text-end text-danger fw-bold">${fmt(totalSpent)}</td>
                <td class="text-end fw-bold ${tBalColor}">${fmt(tBal)}</td>
                <td class="align-middle px-3">
                    <div class="progress" style="height: 20px; background-color: #d6d8db;">
                        <div class="progress-bar ${tPColor}" role="progressbar" style="width: ${tP}%">${tP.toFixed(2)}%</div>
                    </div>
                </td>
            </tr>
        `);

        var sortProg = (arr) => arr.slice().sort((a, b) => {
            var pA = (a.allocated > 0) ? (a.spent / a.allocated) : 0;
            var pB = (b.allocated > 0) ? (b.spent / b.allocated) : 0;
            return pB - pA;
        });

        renderDeptTable(sortProg(data.byDeptAll), '#tableDeptAllBody');
        renderDeptTable(sortProg(data.byDeptMoph), '#tableDeptMophBody');
        renderDeptTable(sortProg(data.byDeptNon), '#tableDeptNonBody');
    }

    function renderDeptTable(deptList, tbodyId) {
        var tbody = $(tbodyId).empty();
        if (!deptList || deptList.length === 0) { tbody.append('<tr><td colspan="6" class="text-center py-3 text-muted">ไม่มีข้อมูล</td></tr>'); return; }
        var fmt = (n) => Number(n).toLocaleString(undefined, { minimumFractionDigits: 2 });
        deptList.forEach(d => {
            var bal = d.allocated - d.spent;
            var p = (d.allocated > 0) ? (d.spent / d.allocated * 100) : 0;
            var colorClass = (p >= 80) ? 'bg-success' : (p >= 50 ? 'bg-warning' : 'bg-danger');
            tbody.append(`<tr style="cursor: pointer;" onclick="openDrillDown('${d.name}')" title="คลิกเพื่อดูรายละเอียด"><td class="ps-4 text-nowrap fw-bold text-primary"><i class="fas fa-search me-2 small opacity-50"></i>${d.name}</td><td class="text-center">${d.count}</td><td class="text-end">${fmt(d.allocated)}</td><td class="text-end">${fmt(d.spent)}</td><td class="align-middle px-3"><div class="progress" style="height: 20px;"><div class="progress-bar ${colorClass}" role="progressbar" style="width: ${p}%">${p.toFixed(1)}%</div></div></td><td class="text-end pe-4 fw-bold ${bal < 0 ? 'text-danger' : 'text-success'}">${fmt(bal)}</td></tr>`);
        });
    }

    function renderSummaryCharts(data) {
        // --- 1. วาดกราฟ Pie Chart (แสดงผลรวมทุกแหล่งงบเหมือนเดิม ไม่เปลี่ยนรูป) ---
        if (summaryPieChart) summaryPieChart.destroy();
        var ctxPie = document.getElementById('chartSource').getContext('2d');
        summaryPieChart = new Chart(ctxPie, {
            type: 'doughnut',
            data: { labels: data.bySource.map(s => s.name), datasets: [{ data: data.bySource.map(s => s.allocated), backgroundColor: ['#0d6efd', '#fd7e14', '#20c997', '#ffc107'], borderWidth: 1 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
        });

        // --- 2. 🎯 วาดกราฟ Bar Chart (Top 5 กลุ่มงาน เปรียบเทียบ จัดสรร-เบิกจ่าย พร้อมสีเงื่อนไข) ---
        if (summaryBarChart) summaryBarChart.destroy();

        // ดึงข้อมูลจาก byDeptFiltered (ที่ส่งมาจากหลังบ้าน) และหั่นเอาแค่ 5 อันดับแรก
        var top5 = data.byDeptFiltered.slice(0, 5);
        var ctxBar = document.getElementById('chartTopDept').getContext('2d');

        // 🎯 [ใหม่]: คำนวณสีสำหรับแท่งเบิกจ่ายทีละแท่งตามเงื่อนไข %
        var spentBarColors = top5.map(function (d) {
            // ป้องกันการหารด้วย 0 ถ้างบจัดสรรเป็น 0 ให้เป็นสีแดงไว้ก่อนถ้ามีการเบิก
            if (d.allocated <= 0) {
                return (d.spent > 0) ? '#dc3545' : '#6c757d'; // มีเบิกแต่ไม่งบ=แดง, ไม่มีทั้งคู่=เทา
            }

            // คำนวณสัดส่วน (0.0 - 1.0+)
            var ratio = d.spent / d.allocated;

            // กำหนดสีตามเงื่อนไขของคุณ Jarvis
            if (ratio < 0.5) {
                return '#dc3545'; // 🔴 น้อยกว่า 50% -> สีแดง (Bootstrap Danger)
            } else if (ratio >= 0.5 && ratio < 1.0) {
                return '#fd7e14'; // 🟠 50% ถึง น้อยกว่า 100% -> สีส้ม (Bootstrap Warning/Orange)
            } else {
                return '#198754'; // 🟢 100% ขึ้นไป -> สีเขียว (Bootstrap Success Green)
            }
        });

        summaryBarChart = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: top5.map(d => d.name),
                datasets: [
                    {
                        label: 'งบจัดสรร',
                        data: top5.map(d => d.allocated),
                        backgroundColor: '#0d6efd', // สีน้ำเงินคงเดิม
                        borderRadius: 4
                    },
                    {
                        label: 'เบิกจ่าย',
                        data: top5.map(d => d.spent),
                        // 🎯 [แก้ไข]: ใช้ Array สีที่เราคำนวณมาแทนสีเดียว
                        backgroundColor: spentBarColors,
                        borderRadius: 4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: 'y', // กราฟแท่งแนวนอน
                plugins: {
                    legend: { display: true, position: 'top' },
                    tooltip: {
                        callbacks: {
                            label: function (context) {
                                // คำนวณ % เพื่อโชว์ใน Tooltip ด้วยเลย จะได้รู้ว่าทำไมถึงได้สีนั้น
                                var dataset = context.chart.data.datasets;
                                var alloc = dataset[0].data[context.dataIndex];
                                var spent = dataset[1].data[context.dataIndex];
                                var pct = (alloc > 0) ? (spent / alloc * 100) : 0;

                                return ' ' + context.dataset.label + ': ฿' + context.raw.toLocaleString(undefined, { minimumFractionDigits: 2 }) + ' (' + pct.toFixed(2) + '%)';
                            }
                        }
                    }
                },
                scales: {
                    x: { beginAtZero: true, ticks: { callback: function (v) { return v.toLocaleString(); } } },
                    y: { grid: { display: false } }
                }
            }
        });
    }

    // --- DRILL DOWN LOGIC ---
    function openDrillDown(deptName) {
        CURRENT_DD_DATA = null;
        $('#ddTitle').text(deptName);
        $('#ddAlloc, #ddSpent, #ddProgress').html('<i class="fas fa-spinner fa-spin text-secondary"></i>');
        $('#ddTableBodyAll, #ddTableBodyMoph, #ddTableBodyNon').html('<tr><td colspan="5" class="text-center py-5"><i class="fas fa-spinner fa-spin fa-2x text-success"></i><div class="mt-2 text-muted">กำลังดึงข้อมูล...</div></td></tr>');
        var triggerEl = document.querySelector('#deptDrillDownModal button[data-bs-target="#tab-dd-all"]');
        if (triggerEl) { var tab = bootstrap.Tab.getInstance(triggerEl); if (tab) tab.show(); else new bootstrap.Tab(triggerEl).show(); }
        new bootstrap.Modal(document.getElementById('deptDrillDownModal')).show();

        var m = $('#sumMonth').val();

    function renderDrillDownData(data) {
        if (data.error) { $('#ddTableBodyAll').html(`<tr><td colspan="5" class="text-center text-danger">${data.error}</td></tr>`); return; }
        CURRENT_DD_DATA = data;
        renderProjectTable(data.projectsAll, '#ddTableBodyAll');
        renderProjectTable(data.projectsMoph, '#ddTableBodyMoph');
        renderProjectTable(data.projectsNon, '#ddTableBodyNon');
        updateDrillDownCards('all');
        $('button[data-bs-toggle="tab"]').off('shown.bs.tab').on('shown.bs.tab', function (e) {
            var t = $(e.target).attr("data-bs-target");
            if (t === '#tab-dd-all') updateDrillDownCards('all');
            if (t === '#tab-dd-moph') updateDrillDownCards('moph');
            if (t === '#tab-dd-non') updateDrillDownCards('non');
        });
    }

    function renderProjectTable(projectList, tbodyId) {
        var tbody = $(tbodyId).empty();
        if (!projectList || projectList.length === 0) {
            tbody.append('<tr><td colspan="6" class="text-center py-3 text-muted">ไม่พบข้อมูล</td></tr>');
            return;
        }

        var fmt = (n) => Number(n).toLocaleString(undefined, { minimumFractionDigits: 2 });

        projectList.forEach(p => {
            var pct = p.progress || 0;
            var colorClass = (pct >= 80) ? 'bg-success' : (pct >= 50 ? 'bg-warning text-dark' : 'bg-danger');
            var balColor = (p.balance < 0) ? 'text-danger' : 'text-success';

            // 🛡️ Logic ตรวจสอบงบเกิน (Over Budget Check)
            var approveShow = fmt(p.approved);
            var allocShow = fmt(p.allocated);

            // ถ้าจัดสรร (allocated) มากกว่า อนุมัติ (approved) ให้ทำตัวแดง + ไอคอนเตือน
            if (p.approved > 0 && p.allocated > p.approved) {
                var diff = p.allocated - p.approved;
                allocShow = `<span class="text-danger fw-bold" title="เกินงบอนุมัติ ${fmt(diff)} บาท">${fmt(p.allocated)} <i class="fas fa-exclamation-circle small"></i></span>`;
            } else if (p.allocated < p.approved) {
                allocShow = `<span class="text-muted">${fmt(p.allocated)}</span>`;
            }

            tbody.append(`
            <tr>
                <td class="ps-3">
                    <div class="fw-bold text-dark text-wrap" style="font-size: 0.9rem;">${p.project}</div>
                    <div class="small text-muted mt-1"><i class="fas fa-tasks me-1 opacity-50"></i>${p.activity}</div>
                </td>
                <td class="text-end text-primary fw-bold">${approveShow}</td> <td class="text-end fw-bold">${allocShow}</td> <td class="text-end fw-bold text-danger">${fmt(p.spent)}</td>
                <td class="align-middle px-2">
                    <div class="progress" style="height: 18px; background-color: #e9ecef;">
                        <div class="progress-bar ${colorClass}" role="progressbar" style="width: ${pct}%">${pct.toFixed(1)}%</div>
                    </div>
                </td>
                <td class="text-end pe-3 fw-bold ${balColor}">${fmt(p.balance)}</td>
            </tr>
        `);
        });
    }

    function updateDrillDownCards(type) {
        if (!CURRENT_DD_DATA) return;
        var s = (type === 'moph') ? CURRENT_DD_DATA.sumMoph : (type === 'non' ? CURRENT_DD_DATA.sumNon : CURRENT_DD_DATA.sumAll);
        var fmt = (n) => Number(n).toLocaleString(undefined, { minimumFractionDigits: 2 });
        $('#ddAlloc, #ddSpent, #ddProgress').hide().fadeIn(200);
        $('#ddAlloc').text(fmt(s.allocated)); $('#ddSpent').text(fmt(s.spent));
        var pct = (s.allocated > 0) ? (s.spent / s.allocated * 100) : 0;
        $('#ddProgress').text(pct.toFixed(2) + '%');
    }

    function openRepaymentModal(timestamp, project, loanAmt, balance) { $('#rpTimestamp').val(timestamp); $('#rpProject').text(project); $('#rpLoanAmount').text(Number(loanAmt).toLocaleString()); $('#rpBalance').text(Number(balance).toLocaleString()); $('#rpAmount').val(''); document.getElementById('rpDate').valueAsDate = new Date(); var modal = new bootstrap.Modal(document.getElementById('repaymentModal')); modal.show(); }

    // 📌 [แทนที่] ฟังก์ชันนี้ในไฟล์ js.html ครับ
    function submitRepayment() {
        var timestamp = $('#rpTimestamp').val();
        var amount = parseFloat($('#rpAmount').val());
        var date = $('#rpDate').val();

        if (!amount || amount <= 0) {
            Swal.fire('ข้อมูลไม่ถูกต้อง', 'กรุณาระบุยอดเงินที่ต้องการตัดจ่าย', 'warning');
            return;
        }

        var $btn = $('#repaymentModal .modal-footer .btn-success');
        var originalText = $btn.html();
        $btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin me-2"></i>กำลังบันทึก...');

        google.script.run
            .withSuccessHandler(function (res) {
                $btn.prop('disabled', false).html(originalText);

                if (res.status === 'success') {
                    Swal.fire({
                        icon: 'success',
                        title: 'บันทึกสำเร็จ',
                        text: 'อัปเดตยอดเงินเรียบร้อยแล้ว',
                        timer: 1500,
                        showConfirmButton: false
                    });
                    $('#repaymentModal').modal('hide');

                    // ✅✅ [จุดที่แก้ไข] เปลี่ยนมาเรียกฟังก์ชันนี้แทนครับ ✅✅
                    refreshLoanTableData();

                } else {
                    Swal.fire('เกิดข้อผิดพลาด', res.message, 'error');
                }
            })
            .withFailureHandler(function (error) {
                $btn.prop('disabled', false).html(originalText);
                Swal.fire('Server Error', error.message, 'error');
            })
            .updateLoanRepayment({ timestamp: timestamp, paidAmount: amount, payDate: date });
    }

    function onCascadingChange(prefix, level) {
        var order = $('#' + prefix + 'Order').val();
        var projSel = $('#' + prefix + 'Proj');
        var actSel = $('#' + prefix + 'Act');
        var subSel = $('#' + prefix + 'Sub');
        var divSub = $('#wrapper_' + prefix + '_sub');
        if (level === 'order') {
            projSel.empty().append('<option value="">-- เลือกโครงการ --</option>').prop('disabled', true);
            actSel.empty().append('<option value="">-- ทั้งหมด --</option>').prop('disabled', true);
            subSel.empty().append('<option value="">-- เลือกกิจกรรมย่อย --</option>').prop('disabled', true);
            divSub.addClass('d-none');
            if (!order) return;
            var rows = CACHED_OPTIONS.filter(r => String(r.order) === String(order));
            var projects = [...new Set(rows.map(r => r.project))].sort();
            projects.forEach(p => projSel.append(new Option(p, p)));
            projSel.prop('disabled', false);
        } else if (level === 'proj') {
            var proj = projSel.val();
            actSel.empty().append('<option value="">-- ทั้งหมด --</option>').prop('disabled', true);
            subSel.empty().append('<option value="">-- เลือกกิจกรรมย่อย --</option>').prop('disabled', true);
            divSub.addClass('d-none');
            if (!proj) return;
            var rows = CACHED_OPTIONS.filter(r => String(r.order) === String(order) && r.project === proj);
            var activities = [...new Set(rows.map(r => r.activity))].sort();
            activities.forEach(a => actSel.append(new Option(a, a)));
            actSel.prop('disabled', false);
        } else if (level === 'act') {
            var proj = projSel.val(); var act = actSel.val();
            subSel.empty().append('<option value="">-- เลือกกิจกรรมย่อย --</option>').prop('disabled', true);
            if (!act) { divSub.addClass('d-none'); return; }
            var rows = CACHED_OPTIONS.filter(r => String(r.order) === String(order) && r.project === proj && r.activity === act);
            var subActivities = [...new Set(rows.map(r => r.subActivity).filter(s => s && String(s).trim() !== ""))].sort();
            if (subActivities.length > 0) { divSub.removeClass('d-none'); subActivities.forEach(s => subSel.append(new Option(s, s))); subSel.prop('disabled', false); } else { divSub.addClass('d-none'); }
        }
    }

    function getTimelineDisplayHtml(timeline) { var months = ['ต.ค.', 'พ.ย.', 'ธ.ค.', 'ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.']; var activeCount = timeline.filter(x => x).length; if (activeCount === 0) return '-'; if (activeCount === 12) return '<span class="badge bg-success rounded-pill fw-normal">ทั้งปีงบประมาณ</span>'; var html = '<div class="d-flex flex-wrap gap-1 justify-content-center flex-column align-items-start">'; var quarters = [{ name: 'ไตรมาส 1', indices: [0, 1, 2] }, { name: 'ไตรมาส 2', indices: [3, 4, 5] }, { name: 'ไตรมาส 3', indices: [6, 7, 8] }, { name: 'ไตรมาส 4', indices: [9, 10, 11] }]; quarters.forEach(function (q) { var activeInQ = q.indices.filter(idx => timeline[idx]); if (activeInQ.length === 3) { html += `<span class="badge bg-primary rounded-pill fw-normal mb-1">${q.name}</span>`; } else if (activeInQ.length > 0) { var monthBadges = activeInQ.map(idx => `<span class="badge bg-success fw-normal">${months[idx]}</span>`).join(' '); html += `<div class="mb-1"><strong class="text-secondary small me-1">${q.name} :</strong>${monthBadges}</div>`; } }); html += '</div>'; return html; }

    function resetSearch() { $('#searchDeptSelect').val('').trigger('change'); $('#searchType').val(''); $('#searchQuarter').val(''); $('#searchMonth').val(''); $('#sum-count').text('0'); $('#sum-approved').text('0.00'); $('#sum-allocated').text('0.00'); if ($.fn.DataTable.isDataTable('#searchTable')) { $('#searchTable').DataTable().clear().destroy(); } $('#searchTableBody').empty(); }


    // ==========================================
    // 📌 ฟังก์ชัน renderSearchPage (เพิ่มคอลัมน์ เบิกจ่าย และ คงเหลือ)
    // ==========================================
    function renderSearchPage(data) {
        // 1. ปรับ colspan เป็น 8 เพราะเรามี 8 คอลัมน์แล้ว
        if (data.error) {
            $('#searchTableBody').html('<tr><td colspan="8" class="text-danger text-center py-4"><i class="fas fa-exclamation-triangle me-2"></i>' + data.error + '</td></tr>');
            return;
        }

        // ดักจับค่า NaN ให้เป็น 0
        var fmt = (n) => (parseFloat(n) || 0).toLocaleString(undefined, { minimumFractionDigits: 2 });

        $('#sum-count').text(Number(data.summary.count).toLocaleString());
        $('#sum-approved').text(fmt(data.summary.approved));
        $('#sum-allocated').text(fmt(data.summary.allocated));

        if ($.fn.DataTable.isDataTable('#searchTable')) {
            $('#searchTable').DataTable().destroy();
        }

        var tbody = $('#searchTableBody');
        tbody.empty();

        data.list.forEach(function (row) {
            var timelineHtml = getTimelineDisplayHtml(row.timeline);

            let bType = '';
            if (row.budgetType) bType = String(row.budgetType).trim();
            else if (row.type) bType = String(row.type).trim();
            else bType = 'ไม่มีข้อมูลประเภทงบ';

            let bSource = '';
            if (row.budgetSource) bSource = String(row.budgetSource).trim();
            else if (row.source) bSource = String(row.source).trim();
            else bSource = 'ไม่มีข้อมูลแหล่งงบ';

            let badgesHtml = '';

            if (bType.includes('เงินนอก')) {
                badgesHtml += `<span class="badge bg-success me-1 mb-2 shadow-sm">${bType}</span>`;
            } else if (bType === 'สป.สธ.' || bType.includes('สป.สธ') || bType.includes('สป.')) {
                badgesHtml += `<span class="badge bg-primary me-1 mb-2 shadow-sm">${bType}</span>`;
            } else {
                badgesHtml += `<span class="badge bg-secondary me-1 mb-2 shadow-sm">${bType}</span>`;
            }

            if (bSource.includes('ไม่ใช้')) {
                badgesHtml += `<span class="badge bg-danger mb-2 shadow-sm"><i class="fas fa-ban me-1"></i>${bSource}</span>`;
            } else {
                badgesHtml += `<span class="badge border border-secondary text-dark bg-light mb-2 shadow-sm">${bSource}</span>`;
            }

            let detailHtml = `
                <div class="mb-1">${badgesHtml}</div>
                <div class="text-primary fw-bold text-wrap mb-1" style="font-size: 1.15rem; line-height: 1.4;">${row.project}</div>
                <div class="text-muted small"><i class="fas fa-level-up-alt fa-rotate-90 ms-1 me-2 opacity-50"></i>${row.activity || '-'}</div>
            `;

            if (row.subActivity && String(row.subActivity).trim() !== '') {
                detailHtml += `<div class="text-muted small ms-3 mt-1"><i class="fas fa-level-up-alt fa-rotate-90 ms-1 me-2 opacity-50"></i>${row.subActivity}</div>`;
            }

            // 🌟 เช็คสีของยอดคงเหลือ (ยอดคงเหลือ < 0 ให้แสดงสีแดง)
            let balanceClass = (row.balance < 0) ? 'text-danger' : 'text-success';

            // 🌟 เพิ่ม <td> สำหรับ เบิกจ่าย และ คงเหลือ
            tbody.append(`
            <tr>
                <td class="ps-3 text-center fw-bold text-secondary">${row.order}</td>
                <td class="text-center align-top pt-3"><span class="badge bg-light text-dark border">${row.dept}</span></td>
                <td class="align-top py-3" style="min-width: 320px;">${detailHtml}</td>
                <td class="text-center align-top pt-3 text-nowrap">${timelineHtml}</td>
                <td class="text-end align-top pt-3 text-secondary fw-bold">${fmt(row.approved)}</td>
                <td class="text-end align-top pt-3 fw-bold text-primary">${fmt(row.allocated)}</td>
                
                <td class="text-end align-top pt-3 fw-bold text-danger">${fmt(row.spent)}</td>
                <td class="text-end align-top pt-3 fw-bold ${balanceClass}">${fmt(row.balance)}</td>
            </tr>
            `);
        });

        $('#searchTable').DataTable({
            "language": { "search": "ค้นหา:", "paginate": { "next": ">", "previous": "<" } },
            "pageLength": 10,
            "order": [[0, "asc"]]
        });
    }

    function loadYearlyData() { var dept = $('#yearlyDeptSelect').val(); var type = $('#yearlyType').val(); var quarter = $('#yearlyQuarter').val(); var month = $('#yearlyMonth').val(); if ($.fn.DataTable.isDataTable('#yearlyTable')) { $('#yearlyTable').DataTable().destroy(); } $('#yearlyTableBody').html('<tr><td colspan="8" class="text-center"><i class="fas fa-spinner fa-spin"></i></td></tr>'); google.script.run.withSuccessHandler(renderYearlyPage).getYearlyPlanData(dept, type, quarter, month); }
    function resetYearly() { $('#yearlyDeptSelect').val('').trigger('change'); $('#yearlyType').val(''); $('#yearlyQuarter').val(''); $('#yearlyMonth').val(''); $('#yp-count').text('0'); $('#yp-approved').text('0.00'); $('#yp-allocated').text('0.00'); if ($.fn.DataTable.isDataTable('#yearlyTable')) { $('#yearlyTable').DataTable().clear().destroy(); } $('#yearlyTableBody').empty(); }
    function renderYearlyPage(data) { if (data.error) { $('#yearlyTableBody').html('<tr><td colspan="8" class="text-danger">' + data.error + '</td></tr>'); return; } var fmt = (n) => Number(n).toLocaleString(undefined, { minimumFractionDigits: 2 }); $('#yp-count').text(Number(data.summary.projects).toLocaleString()); $('#yp-approved').text(fmt(data.summary.approved)); $('#yp-allocated').text(fmt(data.summary.allocated)); if ($.fn.DataTable.isDataTable('#yearlyTable')) { $('#yearlyTable').DataTable().destroy(); } var tbody = $('#yearlyTableBody'); tbody.empty(); data.list.forEach(row => { var timelineHtml = getTimelineDisplayHtml(row.timeline); tbody.append(`<tr><td class="ps-3">${row.order}</td><td><span class="badge bg-light text-dark border">${row.dept}</span></td><td><div class="fw-bold text-wrap" style="font-size: 1rem;">${row.project}</div><div class="small text-muted mt-1"><i class="fas fa-tasks me-1"></i>${row.activity}</div></td><td><span class="badge bg-white text-dark border border-secondary text-wrap" style="line-height: 1.4;">${row.type} / ${row.budgetSource}</span></td><td class="text-center text-nowrap">${timelineHtml}</td><td class="text-end">${fmt(row.allocated)}</td><td class="text-end">${fmt(row.spent)}</td><td class="text-end pe-3 fw-bold ${row.balance < 0 ? 'text-danger' : 'text-success'}">${fmt(row.balance)}</td></tr>`); }); $('#yearlyTable').DataTable({ "language": { "search": "ค้นหา:", "paginate": { "next": ">", "previous": "<" } }, "pageLength": 10, "order": [[0, "asc"]] }); }
    function initYearlyPage() { }

    // function จัดสรรงบประมาณ
    // ==========================================
    // 8. BUDGET ALLOCATION SYSTEM (FIXED CASCADING & PLAN)
    // ==========================================

    var ALLOC_HISTORY_CACHE = [];
    var SELECTED_ALLOC_ROW = null;

    // --- INITIALIZATION ---
    function initAllocPage() {
        loadAllocHistory();
        populateAllocDropdowns();
    }

    $(document).ready(function () {
        // 1. Setup Select2 for Search
        ['#sAllocOrder', '#sAllocProj', '#sAllocAct', '#sAllocSub'].forEach(id => {
            $(id).select2({ theme: 'bootstrap-5', placeholder: 'เลือกข้อมูล...', allowClear: true, width: '100%' });
        });

        // 2. Setup Select2 for Form (เพิ่ม #fAllocCat)
        var formSelects = ['#fAllocOrder', '#fAllocProj', '#fAllocAct', '#fAllocSub'];
        formSelects.forEach(id => {
            $(id).select2({
                theme: 'bootstrap-5', placeholder: 'เลือกข้อมูล...', allowClear: true, width: '100%', dropdownParent: $('#allocModal'),
                templateResult: formatState, templateSelection: formatState
            });
        });

        // 3. Bind Events (Search) - ✅ เพิ่ม Logic ครบทุกขั้น
        $('#sAllocOrder').on('change', function () { cascadeAllocSearch('order'); });
        $('#sAllocProj').on('change', function () { cascadeAllocSearch('proj'); });
        $('#sAllocAct').on('change', function () { cascadeAllocSearch('act'); });

        // 4. Bind Events (Form)
        $('#fAllocOrder').on('change', function () { cascadeAllocForm('order'); });
        // $('#fAllocDept').on('change', function() { cascadeAllocForm('dept'); });
        // $('#fAllocCat').on('change', function() { cascadeAllocForm('cat'); }); // เพิ่ม event
        $('#fAllocPlan').on('change', function () { cascadeAllocForm('plan'); });
        $('#fAllocProj').on('change', function () { cascadeAllocForm('proj'); });
        $('#fAllocAct').on('change', function () { cascadeAllocForm('act'); });
        $('#fAllocSub').on('change', function () { showAllocInfoBox(); });
    });

    function populateAllocDropdowns() {
        if (!CACHED_OPTIONS) return;
        var orders = [...new Set(CACHED_OPTIONS.map(r => r.order).filter(o => o))].sort((a, b) => a - b);

        // เติม Dropdown ตัวแรก (ลำดับ)
        var $s = $('#sAllocOrder').empty().append('<option value="">-- ทั้งหมด --</option>');
        var $f = $('#fAllocOrder').empty().append('<option value="">-- เลือกลำดับ --</option>');
        orders.forEach(o => {
            $s.append(new Option(o, o));
            $f.append(new Option(o, o));
        });
    }

    // --- LOGIC SEARCH CASCADE (แก้ไขใหม่ให้ครบ) ---
    function cascadeAllocSearch(level) {
        var order = $('#sAllocOrder').val();
        var proj = $('#sAllocProj').val();
        var act = $('#sAllocAct').val();

        var reset = (ids) => ids.forEach(id => $(id).empty().append('<option value="">-- ทั้งหมด --</option>').prop('disabled', true));

        // กรองข้อมูลตั้งต้นจากลำดับ
        var rows = CACHED_OPTIONS;
        if (order) rows = rows.filter(r => String(r.order) === String(order));

        if (level === 'order') {
            reset(['#sAllocProj', '#sAllocAct', '#sAllocSub']);
            if (order) {
                var projs = [...new Set(rows.map(r => r.project))].sort();
                projs.forEach(p => $('#sAllocProj').append(new Option(p, p)));
                $('#sAllocProj').prop('disabled', false);
            }
        } else if (level === 'proj') {
            reset(['#sAllocAct', '#sAllocSub']);
            if (proj) {
                var subRows = rows.filter(r => r.project === proj);
                var acts = [...new Set(subRows.map(r => r.activity))].sort();
                acts.forEach(a => $('#sAllocAct').append(new Option(a, a)));
                $('#sAllocAct').prop('disabled', false);
            }
        } else if (level === 'act') {
            reset(['#sAllocSub']);
            if (act) {
                var subRows = rows.filter(r => r.project === proj && r.activity === act);
                var subs = [...new Set(subRows.map(r => r.subActivity).filter(s => s))].sort();
                if (subs.length > 0) {
                    subs.forEach(s => $('#sAllocSub').append(new Option(s, s)));
                    $('#sAllocSub').prop('disabled', false);
                }
            }
        }
    }

    // ---เริ่มต้น LOGIC FORM CASCADE ---
    function cascadeAllocForm(level) {
        var order = $('#fAllocOrder').val();
        var proj = $('#fAllocProj').val();
        var act = $('#fAllocAct').val();

        var reset = (ids) => ids.forEach(id => $(id).empty().append('<option value="">เลือก...</option>').prop('disabled', true));

        // กรองข้อมูลตามลำดับที่เลือก
        var rows = CACHED_OPTIONS.filter(r => String(r.order) === String(order));

        // Level 1: Order -> Project (ข้ามทุกอย่าง ยิงตรงไป Project)
        if (level === 'order') {
            reset(['#fAllocProj', '#fAllocAct', '#fAllocSub']);
            if (!order) return;

            // ดึงโครงการที่มีในลำดับนี้
            var projs = [...new Set(rows.map(r => r.project))].sort();
            projs.forEach(p => $('#fAllocProj').append(new Option(p, p)));
            $('#fAllocProj').prop('disabled', false);
        }

        // Level 2: Project -> Activity
        if (level === 'proj') {
            reset(['#fAllocAct', '#fAllocSub']);
            if (!proj) return;

            rows = rows.filter(r => r.project === proj);
            var acts = [...new Set(rows.map(r => r.activity))].sort();
            acts.forEach(a => $('#fAllocAct').append(new Option(a, a)));
            $('#fAllocAct').prop('disabled', false);
        }

        // Level 3: Activity -> SubActivity
        if (level === 'act') {
            reset(['#fAllocSub']);
            if (!act) return;

            rows = rows.filter(r => r.project === proj && r.activity === act);
            var subs = [...new Set(rows.map(r => r.subActivity).filter(s => s))].sort();
            if (subs.length > 0) {
                subs.forEach(s => $('#fAllocSub').append(new Option(s, s)));
                $('#fAllocSub').prop('disabled', false);
            } else {
                showAllocInfoBox();
            }
        }
    }
    // --สิ้นสุด LOGIC FORM CASCADE ---

    // --- OTHER FUNCTIONS (InfoBox & Submit) ---
    // (ใช้ของเดิมได้เลยครับ หรือจะก๊อปใหม่ก็ได้เพื่อความชัวร์)
    // 📌 [แทนที่] ฟังก์ชัน showAllocInfoBox ในไฟล์ js.html
    function showAllocInfoBox() {
        var order = $('#fAllocOrder').val();
        var proj = $('#fAllocProj').val();
        var act = $('#fAllocAct').val();
        var sub = $('#fAllocSub').val();

        var row = CACHED_OPTIONS.find(r =>
            String(r.order) === String(order) &&
            r.project === proj &&
            r.activity === act &&
            (sub ? r.subActivity === sub : true)
        );

        if (row) {
            SELECTED_ALLOC_ROW = row;
            $('#allocInfoBox').removeClass('d-none');

            $('#info_cat').text(row.category || '-');
            $('#info_source').text((row.budgetType || '-') + ' / ' + (row.budgetSource || '-'));

            // ✅ [จุดแก้ไข] เปลี่ยนเครื่องหมาย > เป็นสีน้ำเงิน
            var sep = '<span class="text-primary fw-bold mx-2" style="font-size:1.1em;">></span>';

            var fullname = `<span class="text-dark">${row.project}</span>` +
                sep + `<span class="text-muted">${row.activity}</span>`;

            if (row.subActivity) {
                fullname += sep + `<span class="text-muted fst-italic">${row.subActivity}</span>`;
            }

            // ⚠️ ต้องใช้ .html() แทน .text() เพื่อให้แสดงสีได้
            $('#info_fullname').html(fullname);

            // แสดงตัวเลข
            $('#info_approve').text(Number(row.approved || 0).toLocaleString());
            $('#info_allocated').text(Number(row.allocated).toLocaleString());
            $('#info_spent').text(Number(row.spent).toLocaleString());
        } else {
            $('#allocInfoBox').addClass('d-none');
            SELECTED_ALLOC_ROW = null;
        }
    }
    //สิ้นสุด function จัดสรรงบประมาณ

    // ==========================================
    // 📌 ส่วนที่ขาดหายไป: Modal, Save, History Table
    // ==========================================

    // 1. เปิด Modal (แก้ปัญหาปุ่มกดไม่ติด)
    function openAllocModal() {
        // Reset Form
        $('#fAllocOrder').val(null).trigger('change');
        $('#fAllocAmount').val('');
        $('#fAllocLetter').val('');
        $('#fAllocRemark').val('');

        // ตั้งวันที่ปัจจุบัน
        var today = new Date();
        var yyyy = today.getFullYear();
        var mm = String(today.getMonth() + 1).padStart(2, '0');
        var dd = String(today.getDate()).padStart(2, '0');
        document.getElementById('fAllocDate').value = yyyy + '-' + mm + '-' + dd;

        $('#allocInfoBox').addClass('d-none');

        new bootstrap.Modal(document.getElementById('allocModal')).show();
    }

    // 2. บันทึกข้อมูล (Submit)
    function submitNewAllocation() {
        // Validate Input
        if (!SELECTED_ALLOC_ROW) { Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกโครงการ/กิจกรรมให้ถูกต้อง', 'warning'); return; }
        var amount = parseFloat($('#fAllocAmount').val());
        var date = $('#fAllocDate').val();

        if (!amount || isNaN(amount)) { Swal.fire('ข้อมูลไม่ครบ', 'กรุณาระบุจำนวนเงินจัดสรร', 'warning'); return; }
        if (!date) { Swal.fire('ข้อมูลไม่ครบ', 'กรุณาระบุวันที่จัดสรร', 'warning'); return; }

        // Prepare Data
        var formData = {
            id: SELECTED_ALLOC_ROW.id,
            currentAlloc: amount,
            date: date,
            letterNo: $('#fAllocLetter').val(),
            remark: $('#fAllocRemark').val(),
            fullData: SELECTED_ALLOC_ROW
        };

        // UI Loading
        var $btn = $('#allocModal .modal-footer .btn-warning');
        var orgHtml = $btn.html();
        $btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin me-2"></i>กำลังบันทึก...');

        // Call Server
        google.script.run.withSuccessHandler(function (res) {
            $btn.prop('disabled', false).html(orgHtml);
            if (res.status === 'success') {
                Swal.fire({
                    icon: 'success',
                    title: 'บันทึกสำเร็จ',
                    text: 'เพิ่มยอดจัดสรรและบันทึกประวัติเรียบร้อยแล้ว',
                    timer: 1500,
                    showConfirmButton: false
                });
                $('#allocModal').modal('hide');

                refreshMasterData(); // โหลด Master ใหม่
                loadAllocHistory();  // โหลดตารางประวัติใหม่
            } else {
                Swal.fire('Error', res.message, 'error');
            }
        }).saveAllocation(formData);
    }

    // 3. โหลดประวัติการจัดสรร (แก้ปัญหา Dropdown ไม่ขึ้นเพราะ Error ตรงนี้)
    function loadAllocHistory() {
        $('#allocHistoryBody').html('<tr><td colspan="7" class="text-center py-4"><i class="fas fa-spinner fa-spin me-2"></i>กำลังโหลดประวัติ...</td></tr>');
        google.script.run.withSuccessHandler(function (data) {
            ALLOC_HISTORY_CACHE = data || [];
            renderAllocHistoryTable(ALLOC_HISTORY_CACHE);
        }).getAllocationHistory();
    }

    // 4. แสดงตารางประวัติ
    function renderAllocHistoryTable(rows) {
        var tbody = $('#allocHistoryBody').empty();

        if (!rows || rows.length === 0) {
            tbody.append('<tr><td colspan="7" class="text-center py-4 text-muted">ไม่พบข้อมูลประวัติการจัดสรร</td></tr>');
            return;
        }

        rows.forEach(r => {
            var dateShow = r.date;
            var desc = `<div class="fw-bold text-dark text-wrap" style="font-size: 0.95rem;">${r.project}</div>`;
            if (r.activity) desc += `<div class="small text-muted mt-1"><i class="fas fa-angle-right me-1"></i>${r.activity}</div>`;
            if (r.subActivity) desc += `<div class="small text-muted ms-3 fst-italic">- ${r.subActivity}</div>`;

            // Badge แหล่งงบ
            var sourceHtml = `<div class="d-flex flex-column gap-1">
            <span class="badge bg-light text-dark border fw-normal">${r.type || '-'}</span>
            <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 fw-normal text-wrap">${r.source || '-'}</span>
        </div>`;

            tbody.append(`
            <tr>
                <td class="text-center text-primary fw-bold small text-nowrap">${dateShow}</td>
                <td class="text-center fw-bold text-secondary">${r.order}</td>
                <td>${desc}</td>
                <td>${sourceHtml}</td>
                <td class="text-center small">${r.letterNo || '-'}</td>
                <td class="text-end fw-bold text-primary">+${Number(r.currentAlloc).toLocaleString()}</td>
                <td class="text-end fw-bold text-success">${Number(r.accumulatedAlloc).toLocaleString()}</td>
            </tr>
        `);
        });
    }

    // 5. ค้นหาประวัติ (ปุ่มค้นหา)
    function runAllocHistorySearch() {
        var order = $('#sAllocOrder').val();
        var proj = $('#sAllocProj').val();

        // Filter จาก CACHE
        var filtered = ALLOC_HISTORY_CACHE.filter(r => {
            var match = true;
            if (order && String(r.order) !== String(order)) match = false;
            if (proj && r.project !== proj) match = false;
            return match;
        });
        renderAllocHistoryTable(filtered);
    }

    // 6. ล้างค่าค้นหา
    function resetAllocSearch() {
        $('#sAllocOrder').val(null).trigger('change');
        renderAllocHistoryTable(ALLOC_HISTORY_CACHE);
    }

    // 🎯 ดักจับ Event การเลื่อน (Scroll) เพื่อจัดการ Sticky Panel
    window.addEventListener('scroll', function () {
        var stickyPanel = document.getElementById('summaryFilterPanel');
        if (stickyPanel) {
            // ถ้าเลื่อนลงมาเกิน 100px ให้เติมคลาส is-sticky เพื่อเพิ่มเงา
            if (window.scrollY > 100) {
                stickyPanel.classList.add('is-sticky');
            } else {
                stickyPanel.classList.remove('is-sticky');
            }
        }
    });

</script>
