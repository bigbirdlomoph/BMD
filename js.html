    // ==========================================
    // 📌 [อัปเกรดสูงสุด] ฟังก์ชันแสดง Modal รายละเอียดแบบจัดกลุ่มโครงการ (Tree View)
    // ==========================================

    // 1. กดดูจาก "หน้าติดตามโครงการ"
    window.viewTrackingDetail = function (deptName) {
        const typeFilter = $('#trackingTypeFilter').val();
        const sourceFilter = $('#trackingSourceFilter').val();

        // 🎯 แก้ไข: ใช้ CACHED_OPTIONS เป็นกระเป๋าสำรอง หากกระเป๋าหลักยังว่างเปล่า
        let sourceData = (globalMasterPlanData && globalMasterPlanData.length > 0) ? globalMasterPlanData : (CACHED_OPTIONS || []);

        let rawProjects = sourceData.filter(i => {
            if (i.dept !== deptName) return false;
            if (typeFilter && i.type !== typeFilter) return false;
            if (sourceFilter && i.source !== sourceFilter) return false;
            return true;
        });

        renderDeptModal(deptName, rawProjects);
    }

    // 2. กดดูจาก "หน้ารายงานสรุป"
    window.viewSummaryDetail = function (deptName, tabType) {
        const masterType = $('#sumType').val();
        const masterSource = $('#sumSource').val();

        // 🎯 แก้ไข: ใช้ CACHED_OPTIONS เป็นกระเป๋าสำรอง หากกระเป๋าหลักยังว่างเปล่า
        let sourceData = (globalMasterPlanData && globalMasterPlanData.length > 0) ? globalMasterPlanData : (CACHED_OPTIONS || []);

        let rawProjects = sourceData.filter(i => {
            if (i.dept !== deptName) return false;
            if (i.status !== 'ACTIVE') return false;

            var cType = String(i.type || "").replace(/\s+/g, '');
            var cSource = String(i.source || "").replace(/\s+/g, '');

            // กรองตามตัวเลือกด้านบนสุดของหน้าสรุป
            if (masterType && cType !== String(masterType).replace(/\s+/g, '')) return false;
            if (masterSource && cSource !== String(masterSource).replace(/\s+/g, '')) return false;

            // กรองแยกว่ากดมาจาก Tab ไหน (ทั้งหมด, สป.สธ., เงินนอก)
            var isNonMoph = (String(i.type).includes('เงินนอก') || String(i.type).includes('เงินบำรุง') || String(i.type).includes('บริจาค') || String(i.type).toUpperCase().includes('NON'));

            if (tabType === 'MOPH' && isNonMoph) return false;
            if (tabType === 'NONMOPH' && !isNonMoph) return false;

            return true;
        });

        renderDeptModal(deptName, rawProjects);
    }

    // 3. ฟังก์ชันวาด UI ลง Modal (ใช้ร่วมกันทั้ง 2 หน้า)
    window.renderDeptModal = function (deptName, rawProjects) {
        const currentMonthIdx = (new Date().getMonth() + 3) % 12;
        const groupedData = {};

        rawProjects.forEach(p => {
            const projName = p.proj || 'ไม่ระบุชื่อโครงการ';
            if (!groupedData[projName]) {
                groupedData[projName] = {
                    activities: [], totalAlloc: 0, totalSpent: 0,
                    type: p.type, source: p.source, order: p.order
                };
            }
            groupedData[projName].activities.push(p);
            groupedData[projName].totalAlloc += Number(p.allocated || 0);
            groupedData[projName].totalSpent += Number(p.spent || 0);
        });

        const sortedProjectNames = Object.keys(groupedData).sort((a, b) =>
            (Number(groupedData[a].order) || 9999) - (Number(groupedData[b].order) || 9999)
        );

        let html = '';
        const fmt = (num) => Number(num || 0).toLocaleString(undefined, { minimumFractionDigits: 2 });

        sortedProjectNames.forEach(projName => {
            const group = groupedData[projName];
            const isTargetFocus = (String(group.type).includes('เงินนอก') && String(group.source).includes('เงินบำรุง สสจ.เลย'));
            const highlightClass = isTargetFocus ? 'table-primary bg-opacity-10' : 'bg-light';

            html += `
                <tr class="${highlightClass}">
                    <td class="text-center fw-bold align-middle" style="background-color: rgba(0,0,0,0.05)">${group.order || '-'}</td>
                    <td class="align-middle" style="background-color: rgba(0,0,0,0.05)">
                        <div class="fw-bold text-primary" style="font-size: 1rem;">
                            <i class="fas fa-folder-open me-2"></i>โครงการ: ${projName}
                            ${isTargetFocus ? '<i class="fas fa-star text-warning ms-1" title="กลุ่มเป้าหมายหลัก"></i>' : ''}
                        </div>
                        <div class="small text-muted">
                            <span class="badge bg-white text-dark border fw-normal">${group.type}</span>
                            <span class="badge bg-white text-dark border fw-normal">${group.source}</span>
                        </div>
                    </td>
                    <td class="text-end fw-bold align-middle" style="background-color: rgba(0,0,0,0.05); color: #0d6efd;">${fmt(group.totalAlloc)}</td>
                    <td class="text-end fw-bold align-middle" style="background-color: rgba(0,0,0,0.05); color: #198754;">${fmt(group.totalSpent)}</td>
                    <td colspan="2" class="text-center align-middle" style="background-color: rgba(0,0,0,0.05)">
                        <span class="small fw-bold text-muted">รวมงบประมาณโครงการ</span>
                    </td>
                </tr>
            `;

            group.activities.sort((a, b) => (Number(a.order) || 999) - (Number(b.order) || 999));

            group.activities.forEach(act => {
                const actAlloc = Number(act.allocated || 0);
                const actSpent = Number(act.spent || 0);
                let statusHtml = '';
                let range = getTimelineRange(act);

                if (actAlloc === 0) statusHtml = `<span class="badge bg-secondary rounded-pill px-2" style="font-size: 0.7rem;"><i class="fas fa-hourglass-half me-1"></i>รอจัดสรร</span>`;
                else if (actSpent > 0) statusHtml = `<span class="badge bg-success rounded-pill px-2" style="font-size: 0.7rem;"><i class="fas fa-check me-1"></i>ดำเนินการแล้ว</span>`;
                else if (range.start < 12 && currentMonthIdx >= range.start) statusHtml = `<span class="badge bg-danger rounded-pill px-2 animate-pulse" style="font-size: 0.7rem;"><i class="fas fa-exclamation-triangle me-1"></i>ล่าช้า</span>`;
                else statusHtml = `<span class="badge bg-info text-dark rounded-pill px-2" style="font-size: 0.7rem;"><i class="fas fa-calendar-alt me-1"></i>รอตามแผน</span>`;

                let pct = actAlloc > 0 ? (actSpent / actAlloc) * 100 : 0;

                // 🌟 ดึงข้อมูล 4 คอลัมน์ใหม่มาแสดงในตาราง
                let opBadge = act.opType ? `<span class="badge bg-light text-secondary border me-1 mt-1"><i class="fas fa-tasks me-1"></i>${act.opType}</span>` : '';
                let expBadge = act.expType ? `<span class="badge bg-light text-secondary border mt-1"><i class="fas fa-file-invoice-dollar me-1"></i>${act.expType}</span>` : '';
                let detailText = act.expDetail ? `<div class="small text-muted mt-1" style="font-size: 0.75rem;"><i class="fas fa-info-circle me-1"></i>${act.expDetail}</div>` : '';
                let remarkText = act.projRemark ? `<div class="small text-danger mt-1" style="font-size: 0.75rem;"><i class="fas fa-exclamation-circle me-1"></i>${act.projRemark}</div>` : '';

                html += `
                    <tr>
                        <td class="text-center text-muted small align-middle">${act.order || '-'}</td>
                        <td class="ps-4 align-middle">
                            <div class="text-dark fw-bold"><i class="fas fa-level-up-alt fa-rotate-90 me-2 text-muted"></i>${act.act || act.proj}</div>
                            <div>${opBadge}${expBadge}</div>
                            ${detailText}
                            ${remarkText}
                        </td>
                        <td class="text-end align-middle" style="font-size: 0.9rem;">
                            ${fmt(actAlloc)}
                            <div class="progress mt-1" style="height: 3px;"><div class="progress-bar bg-info" style="width: ${pct}%"></div></div>
                        </td>
                        <td class="text-end align-middle ${actSpent > 0 ? 'text-success' : 'text-muted'}" style="font-size: 0.9rem;">${fmt(actSpent)}</td>
                        <td class="text-center small text-muted align-middle">${getPlanMonths(act)}</td>
                        <td class="text-center align-middle">${statusHtml}</td>
                    </tr>
                `;
            });
        });

        $('#modalDeptTitle').html(`<i class="fas fa-sitemap me-2"></i>สถานะโครงการ: ${deptName}`);
        $('#modalDeptTableBody').html(html || '<tr><td colspan="6" class="text-center py-4">ไม่พบข้อมูล</td></tr>');
        $('#modalDeptTracking').modal('show');
    }

    function getPlanMonths(item) {
        let range = getTimelineRange(item);
        if (range.start < 12) {
            let months = [];
            for (let i = range.start; i <= range.end; i++) {
                months.push(trackMonthNames[i]);
            }
            return months.join(', ');
        }
        return '-';
    }

    // ==========================================
    // 📌 ระบบค้นหาแผนปฏิบัติ (Search Page) + Cascading Filter
    // ==========================================

    // 🌟 ดักจับ Event เมื่อผู้ใช้เปลี่ยน "ประเภทงบ" หรือคลิกที่ช่อง
    $(document).ready(function () {
        $('#searchType').on('change', function () {
            updateSearchSourceDropdown();
        });

        // 🌟 โหลดข้อมูลแหล่งงบประมาณทันทีที่เอาเมาส์ไปคลิก (ป้องกันข้อมูลไม่มาตอนเปิดเว็บใหม่ๆ)
        $('#searchSource').on('focus mouseenter', function () {
            if ($(this).find('option').length <= 1) {
                updateSearchSourceDropdown();
            }
        });
    });

    // 🌟 ฟังก์ชันสร้างตัวเลือกแหล่งงบประมาณอัตโนมัติ (แก้ไขใช้ CACHED_OPTIONS)
    function updateSearchSourceDropdown() {
        let sType = $('#searchType').val();
        let $source = $('#searchSource');
        let currentVal = $source.val(); // เก็บค่าเดิมไว้ก่อน

        $source.empty().append('<option value="">-- ทุกแหล่งงบ --</option>');

        // 🎯 ใช้ CACHED_OPTIONS เป็นตัวหลัก เพราะโหลดมาเตรียมไว้ตั้งแต่หน้าเว็บเด้งขึ้นมาแล้ว
        let dataSource = (globalMasterPlanData && globalMasterPlanData.length > 0) ? globalMasterPlanData : (CACHED_OPTIONS || []);

        if (!dataSource || dataSource.length === 0) return;

        // กรองหาว่าประเภทงบที่เลือก มีแหล่งงบอะไรให้ใช้บ้าง
        let validSources = dataSource.filter(r => {
            if (r.status !== 'ACTIVE') return false;
            if (sType) {
                let rType = String(r.type || '');
                if (sType === 'MOPH' && (!rType.includes('สป.สธ') || rType.includes('เงินนอก'))) return false;
                if (sType === 'NONMOPH' && !rType.includes('เงินนอก')) return false;
            }
            return true;
        }).map(r => r.source).filter((val, index, self) => val && self.indexOf(val) === index).sort();

        validSources.forEach(s => $source.append(`<option value="${s}">${s}</option>`));

        // คืนค่าเดิมที่เคยเลือกไว้ให้ (ถ้ายังมีในตัวเลือก)
        if (currentVal && validSources.includes(currentVal)) {
            $source.val(currentVal);
        }
    }

    function resetSearch() {
        $('#searchDeptSelect').val('').trigger('change');
        $('#searchType').val('');
        $('#searchSource').val('');
        $('#searchQuarter').val('');
        $('#searchMonth').val('');

        // ล้างค่าช่องคีย์เวิร์ดที่เพิ่มเข้ามาใหม่
        $('#searchKeyword').val('');

        updateSearchSourceDropdown();
        renderSearchTable([]);
    }

    function runSearch() {
        if (!globalMasterPlanData || globalMasterPlanData.length === 0) {
            Swal.fire({ title: 'กำลังโหลดข้อมูล...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
            google.script.run.withSuccessHandler(function (data) {
                globalMasterPlanData = data;
                updateSearchSourceDropdown(); // อัปเดต Dropdown ครั้งแรกเมื่อโหลดเสร็จ
                Swal.close();
                executeSearchLogic();
            }).getAdminMasterPlan();
        } else {
            executeSearchLogic();
        }
    }

    function executeSearchLogic() {
        let sDept = $('#searchDeptSelect').val();
        let sType = $('#searchType').val();
        let sSource = $('#searchSource').val();
        let sQuarter = $('#searchQuarter').val();
        let sMonth = $('#searchMonth').val();

        // ดึงค่าจากช่องค้นหาคีย์เวิร์ด แปลงเป็นตัวเล็กเพื่อการเปรียบเทียบ
        let sKeyword = $('#searchKeyword').val().trim().toLowerCase();

        let filtered = globalMasterPlanData.filter(r => {
            if (r.status !== 'ACTIVE') return false;
            if (sDept && r.dept !== sDept) return false;

            if (sType) {
                let rType = String(r.type || '');
                if (sType === 'MOPH' && (!rType.includes('สป.สธ') || rType.includes('เงินนอก'))) return false;
                if (sType === 'NONMOPH' && !rType.includes('เงินนอก')) return false;
            }

            if (sSource && r.source !== sSource) return false;

            if (sMonth !== "") {
                let mIdx = parseInt(sMonth);
                if (!r.timeline || r.timeline[mIdx] !== 1) return false;
            }

            if (sQuarter !== "") {
                if (!r.timeline) return false;
                let qMatch = false;
                if (sQuarter === 'Q1' && (r.timeline[0] == 1 || r.timeline[1] == 1 || r.timeline[2] == 1)) qMatch = true;
                if (sQuarter === 'Q2' && (r.timeline[3] == 1 || r.timeline[4] == 1 || r.timeline[5] == 1)) qMatch = true;
                if (sQuarter === 'Q3' && (r.timeline[6] == 1 || r.timeline[7] == 1 || r.timeline[8] == 1)) qMatch = true;
                if (sQuarter === 'Q4' && (r.timeline[9] == 1 || r.timeline[10] == 1 || r.timeline[11] == 1)) qMatch = true;
                if (!qMatch) return false;
            }

            // ระบบค้นหาเจาะลึก (Deep Search) ครอบคลุม โครงการ, กิจกรรมหลัก, กิจกรรมย่อย
            if (sKeyword) {
                let projStr = String(r.proj || '').toLowerCase();
                let actStr = String(r.act || '').toLowerCase();
                let subActStr = String(r.subAct || r.sub || '').toLowerCase();

                // ถ้าคีย์เวิร์ดไม่ตรงกับฟิลด์ไหนเลย ให้คัดทิ้ง
                if (!projStr.includes(sKeyword) && !actStr.includes(sKeyword) && !subActStr.includes(sKeyword)) {
                    return false;
                }
            }

            return true;
        });

        renderSearchTable(filtered);
    }

    function renderSearchTable(data) {
        // 🔥 นำตัวแปร count ออกจากการนับบรรทัดเริ่มต้น
        let sumApprove = 0, sumAlloc = 0;

        if ($.fn.DataTable.isDataTable('#searchTable')) {
            $('#searchTable').DataTable().clear().destroy();
        }

        let tbody = $('#searchTableBody').empty();
        let html = '';

        if (!data || data.length === 0) {
            html = '<tr><td colspan="8" class="text-center text-muted py-4">ไม่พบข้อมูล</td></tr>';
            // เซ็ตยอดเป็น 0 กรณีไม่พบข้อมูล
            $('#sum-count').text('0');
            $('#sum-approved').text('0.00');
            $('#sum-allocated').text('0.00');
        } else {
            let grouped = {};
            data.forEach(r => {
                // 🌟 นับยอดเงินรวมจากทุกกิจกรรมย่อย (อันนี้ยังต้องบวกทุกบรรทัด)
                sumApprove += (Number(r.approved) || 0);
                sumAlloc += (Number(r.allocated) || 0);

                // 🗂️ จัดกลุ่มข้อมูลตามชื่อโครงการ
                let pName = String(r.proj || 'ไม่ระบุชื่อโครงการ').trim();
                if (!grouped[pName]) {
                    grouped[pName] = {
                        type: String(r.type || '').trim(),
                        source: String(r.source || '').trim(),
                        dept: String(r.dept || '-').trim(),
                        order: r.order || '-',
                        items: []
                    };
                }
                grouped[pName].items.push(r);
            });

            // 🎯 การแก้ไข: ให้นับจำนวนโครงการจาก "จำนวนกลุ่ม" ที่จัดได้สำเร็จ
            let projectCount = Object.keys(grouped).length;

            for (let pName in grouped) {
                let g = grouped[pName];

                let typeBadgeHtml = '';
                if (g.type) {
                    let typeStyle = 'background-color: #6c757d; color: white;';
                    if (g.type.includes('สป.สธ')) typeStyle = 'background-color: #1a237e; color: white;';
                    else if (g.type.includes('เงินนอก')) typeStyle = 'background-color: #0d6efd; color: white;';
                    typeBadgeHtml = `<span class="badge fw-normal shadow-sm" style="${typeStyle}">${g.type}</span>`;
                }

                let sourceBadgeHtml = '';
                if (g.source) {
                    let sourceStyle = 'background-color: #f8f9fa; color: #6c757d; border: 1px solid #dee2e6;';
                    if (g.source.includes('เงินบำรุง สสจ.เลย')) sourceStyle = 'background-color: #e6f2ff; color: #0d6efd; border: 1px solid #99caff;';
                    sourceBadgeHtml = `<span class="badge fw-normal" style="${sourceStyle}">${g.source}</span>`;
                }
                let badgeContainer = (typeBadgeHtml || sourceBadgeHtml) ? `<div class="mb-1 d-flex gap-2 flex-wrap">${typeBadgeHtml}${sourceBadgeHtml}</div>` : '';

                html += `
                <tr class="table-light">
                    <td class="text-center fw-bold align-middle text-muted">${g.order}</td>
                    <td class="align-middle fw-bold text-dark">${g.dept}</td>
                    <td class="align-middle">
                        ${badgeContainer}
                        <div class="text-primary fw-bold mt-1" style="font-size: 1.05rem;">โครงการ : ${pName}</div>
                    </td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
            `;

                g.items.forEach(act => {
                    let range = typeof getTimelineRange === 'function' ? getTimelineRange(act) : { start: 12, end: 12 };
                    let timeStr = (range.start < 12 && typeof trackMonthNames !== 'undefined') ? `<span class="badge bg-info text-dark bg-opacity-25 border border-info">${trackMonthNames[range.start]} - ${trackMonthNames[range.end]}</span>` : '-';

                    let mainAct = String(act.act || '').trim();
                    let subAct = String(act.subAct || act.sub || '').trim();

                    subAct = subAct.replace(/undefined/gi, '').replace(/null/gi, '').trim();
                    mainAct = mainAct.replace(/undefined/gi, '').replace(/null/gi, '').trim();

                    let detailHtml = `<div class="ms-3 text-dark"><i class="fas fa-level-up-alt fa-rotate-90 me-2 text-muted"></i>กิจกรรมหลัก : ${mainAct || '-'}</div>`;

                    if (subAct.length > 0) {
                        detailHtml += `<div class="text-muted small mt-1 ms-5"><i class="fas fa-level-up-alt fa-rotate-90 me-2"></i>กิจกรรมย่อย : ${subAct}</div>`;
                    }

                    html += `

    function loadYearlyData() {
        if (!globalMasterPlanData || globalMasterPlanData.length === 0) {
            Swal.fire({ title: 'กำลังโหลดข้อมูล...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
            google.script.run.withSuccessHandler(function (data) {
                globalMasterPlanData = data;
                Swal.close();
                executeYearlyLogic();
            }).getAdminMasterPlan();
        } else {
            executeYearlyLogic();

    function executeYearlyLogic() {
        let sDept = $('#yearlyDeptSelect').val();
        let sType = $('#yearlyType').val();
        let sQuarter = $('#yearlyQuarter').val();
        let sMonth = $('#yearlyMonth').val();

        let filtered = globalMasterPlanData.filter(r => {
            if (r.status !== 'ACTIVE') return false;
            if (sDept && r.dept !== sDept) return false;

            if (sType) {
                let rType = String(r.type || '');
                if (sType === 'MOPH' && (!rType.includes('สป.สธ') || rType.includes('เงินนอก'))) return false;
                if (sType === 'NONMOPH' && !rType.includes('เงินนอก')) return false;
            }

            if (sMonth !== "") {
                let mIdx = parseInt(sMonth);
                if (!r.timeline || r.timeline[mIdx] !== 1) return false;
            }

            if (sQuarter !== "") {
                if (!r.timeline) return false;
                let qMatch = false;
                if (sQuarter === 'Q1' && (r.timeline[0] == 1 || r.timeline[1] == 1 || r.timeline[2] == 1)) qMatch = true;
                if (sQuarter === 'Q2' && (r.timeline[3] == 1 || r.timeline[4] == 1 || r.timeline[5] == 1)) qMatch = true;
                if (sQuarter === 'Q3' && (r.timeline[6] == 1 || r.timeline[7] == 1 || r.timeline[8] == 1)) qMatch = true;
                if (sQuarter === 'Q4' && (r.timeline[9] == 1 || r.timeline[10] == 1 || r.timeline[11] == 1)) qMatch = true;
                if (!qMatch) return false;
            }
            return true;
        });

        renderYearlyTable(filtered);
    }

    function renderYearlyTable(data) {
        // เตรียมตัวแปรสำหรับคำนวณ Summary Bar
        let sumAlloc = 0, sumSpent = 0;

        // 🔥 เคลียร์ DataTables เดิมทิ้ง

        let tbody = $('#yearlyTableBody').empty();

        // 💥 กรองบรรทัดว่างทิ้ง (เตะผีหลอก)

        if (validData.length === 0) {
            html = '<tr><td colspan="8" class="text-center text-muted py-4">ไม่พบข้อมูล</td></tr>';

                // บวกสะสมยอดเงินจากทุกๆ กิจกรรม (เฉพาะที่ใช้)
                sumAlloc += (Number(r.allocated) || 0);
                sumSpent += (Number(r.spent) || 0);

                let pName = String(r.proj).trim();
                if (!grouped[pName]) {
                    grouped[pName] = {
                        type: String(r.type || '').trim(),
                        source: String(r.source || '').trim(),
                        dept: String(r.dept || '-').trim(),
                        order: r.order || '-',

            // 🎯 นับจำนวนโครงการจาก "หัวหน้ากลุ่ม" ที่จัดเสร็จแล้ว
            let projectCount = Object.keys(grouped).length;

            // 🎨 วนลูปวาดตารางแบบลดหลั่นชั้น (8 คอลัมน์) 
            for (let pName in grouped) {
                let g = grouped[pName];

                // --- Logic วาด Badge สี ---
                let typeBadgeHtml = '';
                if (g.type) {
                    let typeStyle = 'background-color: #6c757d; color: white;';
                    if (g.type.includes('สป.สธ')) typeStyle = 'background-color: #1a237e; color: white;';
                    else if (g.type.includes('เงินนอก')) typeStyle = 'background-color: #0d6efd; color: white;';
                    typeBadgeHtml = `<span class="badge fw-normal shadow-sm" style="${typeStyle}">${g.type}</span>`;
                }

                let sourceBadgeHtml = '';
                if (g.source) {
                    let sourceStyle = 'background-color: #f8f9fa; color: #6c757d; border: 1px solid #dee2e6;';
                    if (g.source.includes('เงินบำรุง สสจ.เลย')) sourceStyle = 'background-color: #e6f2ff; color: #0d6efd; border: 1px solid #99caff;';
                    sourceBadgeHtml = `<span class="badge fw-normal" style="${sourceStyle}">${g.source}</span>`;
                }
                let badgeContainer = (typeBadgeHtml || sourceBadgeHtml) ? `<div class="mb-1 d-flex gap-2 flex-wrap">${typeBadgeHtml}${sourceBadgeHtml}</div>` : '';

                // 🌟 1. วาดแถวหัวหน้ากลุ่ม (ชื่อโครงการ)
                html += `
                    <tr class="table-light">
                        <td class="text-center fw-bold align-middle text-muted">${g.order}</td>
                        <td class="align-middle fw-bold text-dark">${g.dept}</td>
                        <td class="align-middle py-2">

                        </td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                `;

                // 🌟 2. วาดแถวลูกน้อง (กิจกรรมหลัก/ย่อย)
                g.items.forEach(act => {
                    let range = typeof getTimelineRange === 'function' ? getTimelineRange(act) : { start: 12, end: 12 };
                    let timeStr = (range.start < 12 && typeof trackMonthNames !== 'undefined') ? `<span class="badge bg-info text-dark bg-opacity-25 border border-info">${trackMonthNames[range.start]} - ${trackMonthNames[range.end]}</span>` : '-';

                    let mainAct = String(act.act || '').replace(/undefined/gi, '').replace(/null/gi, '').trim();
                    let subAct = String(act.subAct || act.sub || '').replace(/undefined/gi, '').replace(/null/gi, '').trim();

                    let detailHtml = `<div class="ms-3 text-dark"><i class="fas fa-level-up-alt fa-rotate-90 me-2 text-muted"></i>กิจกรรมหลัก : ${mainAct || '-'}</div>`;

                    if (subAct.length > 0) {
                        detailHtml += `<div class="text-muted small mt-1 ms-5"><i class="fas fa-level-up-alt fa-rotate-90 me-2"></i>กิจกรรมย่อย : ${subAct}</div>`;
                    }

                    html += `
                        <tr>
                            <td></td>
                            <td></td>
                            <td class="align-middle">${detailHtml}</td>
                            <td class="align-middle text-muted small">${g.type}<br>${g.source}</td>
                            <td class="text-center align-middle">${timeStr}</td>
                            <td class="text-end fw-bold text-success align-middle">${Number(act.allocated || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}</td>
                            <td class="text-end text-danger align-middle">${Number(act.spent || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}</td>
                            <td class="text-end fw-bold text-primary align-middle pe-3">${Number(act.balance || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}</td>
                        </tr>
                    `;
                });

            tbody.html(html);

            // 🎯 อัปเดตตัวเลขเข้าแถบ Summary Bar ตัวใหม่!
            $('#yearly-count').text(projectCount.toLocaleString());
            $('#yearly-allocated').text(sumAlloc.toLocaleString(undefined, { minimumFractionDigits: 2 }));
            $('#yearly-spent').text(sumSpent.toLocaleString(undefined, { minimumFractionDigits: 2 }));
        }

        // 🎯 5. ตั้งค่า DataTables
        $('#yearlyTable').DataTable({
            responsive: true,
            "pageLength": 10,
            "lengthChange": true,
            "lengthMenu": [[10, 25, 50, 100, -1], [10, 25, 50, 100, "ทั้งหมด"]],
            "searching": false,
            "ordering": false,
            "info": true,
            "dom": "<'row mb-2'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'>>" +
                "<'row'<'col-sm-12'tr>>" +
                "<'row mt-3 align-items-center'<'col-sm-12 col-md-5'i><'col-sm-12 col-md-7 d-flex justify-content-end'p>>",
            "language": {
                "lengthMenu": "แสดง _MENU_ รายการ",
                "paginate": { "next": "ถัดไป", "previous": "ก่อนหน้า" },
                "info": "แสดง _START_ ถึง _END_ จาก _TOTAL_ รายการ",
                "infoEmpty": "แสดง 0 รายการ",
                "emptyTable": "ไม่พบข้อมูล"
            }
        });
    }

    // ==========================================
    // 📌 [ชุดสมบูรณ์] ระบบรายงานสรุป (Summary Report Page) ⚡
    // ==========================================

    // 1. ประกาศตัวแปร Global สำหรับกราฟ (ห้ามลบ)
    var myChartSource = null;
    var myChartTopDept = null;
    var myChartExpType = null;
    var myChartOpType = null;

    /** 🌟 ฟังก์ชันหลักสำหรับเริ่มโหลดข้อมูล */
    function loadSummary() {
        var sType = $('#sumType').val();

        var sDept = $('#sumDept').val();

        if (typeof Swal !== 'undefined') {
            Swal.fire({ title: 'กำลังประมวลผล...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });

            try {
                // ใช้ข้อมูลที่มีอยู่แล้วเพื่อความรวดเร็ว
                var dataSource = (globalMasterPlanData && globalMasterPlanData.length > 0) ? globalMasterPlanData : (typeof CACHED_OPTIONS !== 'undefined' ? CACHED_OPTIONS : []);

                if (!dataSource || dataSource.length === 0) {
                    google.script.run.withSuccessHandler(function (data) {
                        CACHED_OPTIONS = data;
                        globalMasterPlanData = data;
                        processSummaryData(data, sType, sSource, sDept);
                    }).getAllMasterDataForClient();
                } else {
                    processSummaryData(dataSource, sType, sSource, sDept);
                }
            } catch (err) {
                console.error("Load Summary Error:", err);
                if (typeof Swal !== 'undefined') Swal.fire('Error', err.message, 'error');
            }
        }, 100);
    }

    /** 🌟 ฟังก์ชันคำนวณและจัดกลุ่มข้อมูล (6 ตะกร้า & เรียงลำดับ %) */
    function processSummaryData(data, typeFilter, sourceFilter, deptFilter) {
        try {
            var grandTotal = { allocated: 0, spent: 0, balance: 0, count: 0 };
            var byDeptFiltered = {};
            var byDeptAll = {}, byDeptMoph = {}, byDeptNon = {};
            var bySource = {};
            var byExpType = {}; // 🌟 เพิ่มตัวแปรคำนวณประเภทค่าใช้จ่าย
            var byOpType = {};  // 🌟 เพิ่มตัวแปรคำนวณประเภทการดำเนินงาน

            var customSourceTable = [
                { name: 'สป.สธ.', allocated: 0, spent: 0 },
                { name: 'เงิน นอก สป.', allocated: 0, spent: 0 },
                { name: 'เงินบำรุง สสจ.เลย', allocated: 0, spent: 0 },
                { name: 'เงินบำรุง HRD', allocated: 0, spent: 0 },
                { name: 'งบพัฒนากลุ่มจังหวัด', allocated: 0, spent: 0 },
                { name: 'งบพัฒนาจังหวัด', allocated: 0, spent: 0 }
            ];

            data.forEach(function (row) {
                if (row.status !== 'ACTIVE') return;

                var alloc = Number(row.allocated || 0);
                var spent = Number(row.spent || 0);
                var bal = Number(row.balance || 0);
                var typeVal = String(row.type || "").trim();
                var sourceVal = String(row.source || "").trim();
                var actCodeVal = String(row.actCode || "").trim();
                var deptVal = String(row.dept || "ไม่ระบุ").trim();

                var cType = typeVal.replace(/\s+/g, '');
                var cSource = sourceVal.replace(/\s+/g, '');

                if (cType === 'สป.สธ.') {
                    customSourceTable[0].allocated += alloc; customSourceTable[0].spent += spent;
                } else if (cType === 'เงินนอกสป.') {
                    if (cSource === 'งบพัฒนากลุ่มจังหวัด') { customSourceTable[4].allocated += alloc; customSourceTable[4].spent += spent; }
                    else if (cSource === 'งบพัฒนาจังหวัด') { customSourceTable[5].allocated += alloc; customSourceTable[5].spent += spent; }
                    else if (cSource === 'เงินบำรุงสสจ.เลย') {
                        if (actCodeVal.includes('HRD')) { customSourceTable[3].allocated += alloc; customSourceTable[3].spent += spent; }
                        else { customSourceTable[2].allocated += alloc; customSourceTable[2].spent += spent; }
                    } else { customSourceTable[1].allocated += alloc; customSourceTable[1].spent += spent; }
                }

                var isNonMoph = (typeVal.includes('เงินนอก') || typeVal.includes('เงินบำรุง') || typeVal.includes('บริจาค') || typeVal.toUpperCase().includes('NON'));

                if (!byDeptAll[deptVal]) byDeptAll[deptVal] = { allocated: 0, spent: 0 };
                byDeptAll[deptVal].allocated += alloc; byDeptAll[deptVal].spent += spent;

                if (!isNonMoph) {
                    if (!byDeptMoph[deptVal]) byDeptMoph[deptVal] = { allocated: 0, spent: 0 };
                    byDeptMoph[deptVal].allocated += alloc; byDeptMoph[deptVal].spent += spent;
                } else {
                    if (!byDeptNon[deptVal]) byDeptNon[deptVal] = { allocated: 0, spent: 0 };
                    byDeptNon[deptVal].allocated += alloc; byDeptNon[deptVal].spent += spent;
                }

                var passType = !typeFilter || cType === String(typeFilter).replace(/\s+/g, '');
                var passSource = !sourceFilter || cSource === String(sourceFilter).replace(/\s+/g, '');
                var passDept = !deptFilter || deptVal === deptFilter;

                if (passType && passSource && passDept) {
                    grandTotal.allocated += alloc; grandTotal.spent += spent; grandTotal.balance += bal; grandTotal.count++;
                    if (!byDeptFiltered[deptVal]) byDeptFiltered[deptVal] = { allocated: 0, spent: 0 };
                    byDeptFiltered[deptVal].allocated += alloc; byDeptFiltered[deptVal].spent += spent;

                    // 🌟 คำนวณกราฟพายใหม่ 2 ตัว (เฉพาะข้อมูลที่ผ่าน Filter)
                    var expVal = String(row.expType || "ไม่ระบุ").trim();
                    if (!byExpType[expVal]) byExpType[expVal] = { allocated: 0 };
                    byExpType[expVal].allocated += alloc;

                    var opVal = String(row.opType || "ไม่ระบุ").trim();
                    if (!byOpType[opVal]) byOpType[opVal] = { allocated: 0 };
                    byOpType[opVal].allocated += alloc;
                }

                var group = isNonMoph ? "เงินนอกงบประมาณ" : "งบประมาณ (สป.สธ.)";
                if (!bySource[group]) bySource[group] = { allocated: 0 };
                bySource[group].allocated += alloc;
            });

            var toList = (obj) => Object.keys(obj).map(k => {
                let a = obj[k].allocated;
                let s = obj[k].spent || 0;
                let p = a > 0 ? (s / a) : 0;
                return { name: k, allocated: a, spent: s, pct: p };
            }).sort((a, b) => (b.pct - a.pct) || (b.allocated - a.allocated));

            renderSummaryUI({
                grandTotal: grandTotal,
                customSourceTable: customSourceTable,
                byDeptFiltered: toList(byDeptFiltered),
                byDeptAll: toList(byDeptAll),
                byDeptMoph: toList(byDeptMoph),
                byDeptNon: toList(byDeptNon),
                bySource: toList(bySource),
                byExpType: toList(byExpType), // 🌟 ส่งข้อมูลไปวาดกราฟ
                byOpType: toList(byOpType)    // 🌟 ส่งข้อมูลไปวาดกราฟ
            });

            if (typeof Swal !== 'undefined') Swal.close();
        } catch (err) {
            console.error("Process Error:", err);
            if (typeof Swal !== 'undefined') Swal.fire('Error', err.message, 'error');
        }
    }

    /** 🌟 ฟังก์ชันวาด UI (กราฟและตาราง) - ต้องอยู่นอกฟังก์ชันอื่นเพื่อให้เรียกใช้งานได้ */
    function renderSummaryUI(data) {
        const fmt = (v) => Number(v || 0).toLocaleString(undefined, { minimumFractionDigits: 2 });

        // 1. อัปเดต Card ตัวเลข
        $('#s-total-alloc').text(fmt(data.grandTotal.allocated));
        $('#s-total-spent').text(fmt(data.grandTotal.spent));
        $('#s-total-bal').text(fmt(data.grandTotal.balance));
        let totalPct = data.grandTotal.allocated > 0 ? (data.grandTotal.spent / data.grandTotal.allocated) * 100 : 0;
        $('#s-total-pct').text(totalPct.toFixed(2) + '%');

        // 2. ตารางแหล่งเงิน (6 ตะกร้า)
        let sourceHtml = data.customSourceTable.map(item => {
            let p = item.allocated > 0 ? (item.spent / item.allocated) * 100 : 0;
            let b = item.allocated - item.spent;
            return `<tr>
            <td class="ps-4 text-start fw-bold">${item.name}</td>
            <td class="text-end text-primary fw-bold">${fmt(item.allocated)}</td>
            <td class="text-end text-success">${fmt(item.spent)}</td>
            <td class="text-end text-danger">${fmt(b)}</td>
            <td class="text-center">
                <div class="d-flex align-items-center justify-content-center">
                    <span class="me-2 fw-bold" style="min-width: 45px;">${p.toFixed(2)}%</span>
                    <div class="progress flex-grow-1" style="height: 6px; max-width: 100px;">
                        <div class="progress-bar ${p >= 80 ? 'bg-success' : p >= 50 ? 'bg-warning' : 'bg-danger'}" style="width: ${p}%"></div>
                    </div>
                </div>
            </td>
        </tr>`;
        }).join('');
        $('#tableSourceBody').html(sourceHtml);

        // 3. ตาราง 3 แท็บรายกลุ่มงาน
        // 3. ตาราง 3 แท็บรายกลุ่มงาน (เพิ่มการส่งค่า Tab ไปให้ระบบกรองข้อมูล)
        const buildRows = (list, tabType) => {
            if (!list || list.length === 0) return '<tr><td colspan="6" class="text-center py-4 text-muted">ไม่พบข้อมูล</td></tr>';
            return list.map(item => {
                let p = item.pct * 100;
                let b = item.allocated - item.spent;
                return `<tr>
                <td class="ps-4 fw-bold text-dark">${item.name}</td>
                <td class="text-center">

    function openRepaymentModal(projectId, projName, loanAmt, balance) {

        $('#rpBalanceDisp').text(Number(balance).toLocaleString(undefined, { minimumFractionDigits: 2 }));

    // ==========================================
    // 📌 ฟังก์ชันสั่งล้างหนี้ (ผูกกับปุ่ม "บันทึก" ใน Modal คืนเงิน)
    // ==========================================
    function submitRepayment() {
        var projectId = $('#repayProjectId').val();
        var currentLoan = Number($('#repayCurrentLoan').val()) || 0;

        var actualSpent = Number($('#repayActualSpent').val()) || 0; // ยอดเบิกจ่ายจริงตามบิล
        var returnedAmt = Number($('#repayReturnedAmount').val()) || 0; // ยอดเงินทอนคืนโครงการ
        var totalClear = actualSpent + returnedAmt;
        var repayDate = $('#rpDate').val(); // 🌟 ดึงวันที่จากหน้าจอไปบันทึกลงชีต

        if (totalClear === 0) {
            Swal.fire('เตือน', 'กรุณาระบุยอดเบิกจ่ายจริง หรือ ยอดเงินทอน', 'warning');
            return;
        }
        if (totalClear > currentLoan) {
            Swal.fire('เตือน', 'ยอดรวมที่เคลียร์เกินกว่าหนี้คงค้าง!', 'warning');
            return;
        }

        var payload = {
            projectId: projectId,
            actualSpent: actualSpent,
            returnedAmount: returnedAmt,
            repayDate: repayDate // 🌟 ส่งวันที่ไปให้หลังบ้าน
        };

        $('#btnSaveRepayment').prop('disabled', true).html('<i class="fas fa-spinner fa-spin me-2"></i>กำลังบันทึก...');

        google.script.run
            .withSuccessHandler(function (res) {
                $('#btnSaveRepayment').prop('disabled', false).html('<i class="fas fa-save me-2"></i>ยืนยันการคืนเงิน');
                if (res.success || res.status === 'success') {
                    $('#repaymentModal').modal('hide');
                    Swal.fire({ icon: 'success', title: 'เคลียร์เงินยืมสำเร็จ!', timer: 1500, showConfirmButton: false });

                    refreshMasterData();
                    if (typeof loadLoanHistory === 'function') loadLoanHistory();
                    loadDashboardData();
                } else {
                    Swal.fire('ผิดพลาด', res.message, 'error');
                }
            })
            .withFailureHandler(function (err) {
                $('#btnSaveRepayment').prop('disabled', false).html('<i class="fas fa-save me-2"></i>ยืนยันการคืนเงิน');
                Swal.fire('ขัดข้อง', err.message, 'error');
            })
            .saveRepayment(payload);
    }

    // ==========================================
    // 📌 ฟังก์ชันแก้ไขยอดเงินยืม (Edit Loan Amount)
    // ==========================================
    window.editLoanAmount = function (projectId, projectName, currentAmount) {
        Swal.fire({
            title: 'แก้ไขยอดเงินยืม',
            html: `โครงการ: <b class="text-primary">${projectName}</b><br>ยอดเงินยืมปัจจุบัน: <b>${Number(currentAmount).toLocaleString('en-US', { minimumFractionDigits: 2 })}</b> บาท`,
            input: 'number',
            inputLabel: 'ระบุยอดเงินยืมที่ถูกต้อง (บาท)',
            inputValue: currentAmount, // ใส่ยอดเดิมไว้ให้แก้ไขง่ายๆ
            inputAttributes: {
                min: 0,
                step: 0.01
            },
            showCancelButton: true,
            confirmButtonColor: '#ffc107',
            confirmButtonText: '<i class="fas fa-save me-1 text-dark"></i> บันทึกการแก้ไข',
            cancelButtonText: 'ยกเลิก',
            inputValidator: (value) => {
                if (!value) {
                    return 'กรุณาระบุตัวเลขยอดเงินยืมครับ!'
                }
                if (Number(value) < 0) {
                    return 'ยอดเงินยืมไม่สามารถติดลบได้ครับ!'
                }
            }
        }).then((result) => {
            if (result.isConfirmed) {
                var newAmount = Number(result.value);

                // ถ้าตัวเลขเท่าเดิม ไม่ต้องส่งไปหลังบ้านให้เสียเวลา
                if (newAmount === Number(currentAmount)) {
                    return;
                }

                Swal.fire({ title: 'กำลังอัปเดตข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

                google.script.run
                    .withSuccessHandler(function (res) {
                        if (res.status === 'success') {
                            Swal.fire({ icon: 'success', title: 'แก้ไขสำเร็จ!', text: res.message, timer: 1500, showConfirmButton: false });
                            // โหลดข้อมูลตารางและกราฟใหม่ให้เป็นปัจจุบัน
                            refreshMasterData();
                            if (typeof loadLoanHistory === 'function') loadLoanHistory();
                            loadDashboardData();
                        } else {
                            Swal.fire('ผิดพลาด', res.message, 'error');
                        }
                    })
                    .withFailureHandler(function (err) {
                        Swal.fire('ระบบขัดข้อง', err.message, 'error');
                    })
                    .updateLoanAmount(projectId, newAmount); // วิ่งไปหาฟังก์ชันใหม่ที่เราสร้างไว้ใน Step 1
            }
        });
    }

    // ==========================================
    // 📌 ฟังก์ชันส่งออกตารางเป็นไฟล์ Excel (Export to Excel)
    // ==========================================
    function exportToExcel(tableId, fileName) {
        // เช็คก่อนว่าตารางมีข้อมูลไหม (ป้องกันการ Export ตารางว่างๆ หรือตอนที่กำลังโหลด)
        var table = document.getElementById(tableId);
        if (!table || table.rows.length <= 1 || table.innerText.includes('กำลังโหลด') || table.innerText.includes('ไม่พบข้อมูล')) {
            Swal.fire('แจ้งเตือน', 'ไม่มีข้อมูลสำหรับส่งออก', 'info');
            return;
        }

        Swal.fire({
            title: 'กำลังสร้างไฟล์ Excel...',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        // หน่วงเวลาเล็กน้อยให้หน้าจอโหลด Swal โชว์ขึ้นมาก่อน
        setTimeout(() => {
            try {
                // แปลง HTML Table เป็น Excel Workbook
                var wb = XLSX.utils.table_to_book(table, { sheet: "Sheet1" });

                // สร้างชื่อไฟล์พร้อมวันที่
                var d = new Date();
                var dateStr = d.getFullYear() + ("0" + (d.getMonth() + 1)).slice(-2) + ("0" + d.getDate()).slice(-2);
                var fullFileName = fileName + "_" + dateStr + ".xlsx";

                // ดาวน์โหลดไฟล์
                XLSX.writeFile(wb, fullFileName);

                Swal.close();
            } catch (error) {
                console.error(error);
                Swal.fire('ผิดพลาด', 'ไม่สามารถส่งออกไฟล์ได้', 'error');
            }
        }, 500);
    }

    function loadAllocHistory() {
        $('#allocHistoryBody').html('<tr><td colspan="7" class="text-center py-5 text-muted"><i class="fas fa-spinner fa-spin me-2"></i>กำลังโหลดข้อมูล...</td></tr>');

    function runAllocHistorySearch() {
        var sOrder = $('#sAllocOrder').val();
        var sProj = $('#sAllocProj').val();
        var sAct = $('#sAllocAct').val();
        var sSub = $('#sAllocSub').val();

        var filteredRows = ALLOC_HISTORY_CACHE.filter(r => {
            let match = true;
            if (sOrder && String(r.order) !== String(sOrder)) match = false;
            if (sProj && r.project !== sProj) match = false;
            if (sAct && r.activity !== sAct) match = false;
            if (sSub && r.subActivity !== sSub) match = false;
            return match;
        });
        renderAllocHistoryTable(filteredRows);
    }

    // ==========================================
    // 📌 ฟังก์ชันวาดตาราง ประวัติจัดสรรงบประมาณ 
    // ==========================================
    function renderAllocHistoryTable(rows) {
        if ($.fn.DataTable.isDataTable('#tableAllocHistory')) {
            $('#tableAllocHistory').DataTable().destroy();
        }
        var tbody = $('#allocHistoryBody').empty();

        // 🌟 เปลี่ยน colspan เป็น 9 เพื่อให้ครอบคลุมคอลัมน์ใหม่
        if (!rows || rows.length === 0) {
            tbody.append('<tr><td colspan="9" class="text-center py-5 text-muted">ไม่พบประวัติการจัดสรรงบประมาณ</td></tr>');
            return;
        }

        rows.forEach(r => {
            var allocOld = Number(r.accumulatedAlloc - r.currentAlloc).toLocaleString(undefined, { minimumFractionDigits: 2 });
            var allocNew = Number(r.currentAlloc).toLocaleString(undefined, { minimumFractionDigits: 2 });
            var allocTotal = Number(r.accumulatedAlloc).toLocaleString(undefined, { minimumFractionDigits: 2 });

            var badgeType = r.type ? `<span class="badge bg-primary text-white me-1 shadow-sm"><i class="fas fa-tag me-1"></i>${r.type}</span>` : '';
            var badgeSource = r.source ? `<span class="badge bg-secondary text-white border shadow-sm"><i class="fas fa-wallet me-1"></i>${r.source}</span>` : '';

            var projHTML = `<div class="fw-bold text-primary text-wrap mt-2" style="font-size: 0.95rem;">${r.project || r.proj || '-'}</div>`;

            var actText = r.activity || r.act || '';
            var actHTML = '';
            if (actText) {
                let formattedAct = String(actText).replace(/\n/g, '<br>');
                actHTML = `<div class="text-secondary small fw-bold mt-1" style="padding-left: 0.5rem;"><i class="fas fa-level-up-alt fa-rotate-90 me-1 text-muted"></i> กิจกรรมหลัก : ${formattedAct}</div>`;
            }

            var subText = r.subActivity || r.subAct || r.sub || '';
            var subHTML = '';
            if (subText) {
                let formattedSub = String(subText).replace(/\n/g, '<br>');
                subHTML = `<div class="small text-info mt-1" style="padding-left: 1.5rem; line-height: 1.6;"><i class="fas fa-level-up-alt fa-rotate-90 me-1"></i> กิจกรรมย่อย : <br><div style="padding-left: 1.2rem; margin-top: 2px;" class="text-muted">${formattedSub}</div></div>`;
            }

            // 🌟 เพิ่ม ${r.order} ไว้คอลัมน์แรกสุด
            tbody.append(`
            <tr>
                <td class="text-center text-muted small fw-bold align-middle">${r.order || '-'}</td>
                <td class="text-nowrap small align-middle">${r.date || '-'}</td>
                <td class="small align-middle">${r.dept || '-'}</td>
                <td class="align-middle py-3">
                    <div class="mb-1">${badgeType}${badgeSource}</div>
                    ${projHTML}
                    ${actHTML}
                    ${subHTML}
                </td>
                <td class="text-nowrap small align-middle">${r.letterNo || '-'}</td>
                <td class="text-end text-muted small align-middle">${allocOld}</td>
                <td class="text-end text-success fw-bold align-middle">${allocNew}</td>
                <td class="text-end text-primary fw-bold pe-4 align-middle">${allocTotal}</td>
                <td class="text-center align-middle">
                    <div class="d-flex justify-content-center gap-2">
                        <button class="btn btn-sm btn-outline-warning px-2 py-1 shadow-sm" title="แก้ไขรายการ" onclick="editAllocation('${r.rowId}', '${r.id}', ${r.currentAlloc})">
                            <i class="fas fa-edit fs-6"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger px-2 py-1 shadow-sm" title="ลบรายการ" onclick="deleteAllocation('${r.rowId}', '${r.id}', ${r.currentAlloc})">
                            <i class="fas fa-trash-alt fs-6"></i>
                        </button>
                    </div>
                </td>
            </tr>`);
        });

        $('#tableAllocHistory').DataTable(getBaseDataTableConfig({
            searching: false
        }));
    }

    function cascadeAllocSearch(level) {
        var order = $('#sAllocOrder').val();
        if (level === 'order') {
            var projSel = $('#sAllocProj').empty().append('<option value="">-- เลือกโครงการ --</option>');
            $('#sAllocAct, #sAllocSub').empty().append('<option value="">-- เลือกข้อมูล --</option>').trigger('change').prop('disabled', true);
            if (!order) { projSel.trigger('change').prop('disabled', true); return; }
            var rows = CACHED_OPTIONS.filter(r => String(r.order) === String(order));
            var projects = [...new Set(rows.map(r => r.proj))].sort();
            projects.forEach(p => projSel.append(new Option(p, p)));
            projSel.trigger('change').prop('disabled', false);
        } else if (level === 'proj') {
            var proj = $('#sAllocProj').val();
            var actSel = $('#sAllocAct').empty().append('<option value="">-- เลือกกิจกรรม --</option>');
            $('#sAllocSub').empty().append('<option value="">-- เลือกข้อมูล --</option>').trigger('change').prop('disabled', true);
            if (!proj) { actSel.trigger('change').prop('disabled', true); return; }
            var rows = CACHED_OPTIONS.filter(r => String(r.order) === String(order) && r.proj === proj);
            var activities = [...new Set(rows.map(r => r.act))].sort();
            activities.forEach(a => actSel.append(new Option(a, a)));
            actSel.trigger('change').prop('disabled', false);
        } else if (level === 'act') {
            var proj = $('#sAllocProj').val();
            var act = $('#sAllocAct').val();
            var subSel = $('#sAllocSub').empty().append('<option value="">-- เลือกกิจกรรมย่อย --</option>');
            if (!act) return;
            var rows = CACHED_OPTIONS.filter(r => String(r.order) === String(order) && r.proj === proj && r.act === act);
            var subActivities = [...new Set(rows.map(r => r.subAct).filter(s => s && String(s).trim() !== ""))].sort();
            if (subActivities.length > 0) {
                subActivities.forEach(sub => subSel.append(new Option(sub, sub)));
                subSel.prop('disabled', false);
            }
        }
    }

    function showAllocInfoBox() {
        var order = $('#fAllocOrder').val();
        var proj = $('#fAllocProj').val();
        var act = $('#fAllocAct').val();
        var sub = $('#fAllocSub').val();

        var row = CACHED_OPTIONS.find(r =>
            String(r.order) === String(order) && r.proj === proj && r.act === act && (sub ? r.subAct === sub : true)
        );

        if (row) {
            $('#info_proj_name').text(row.proj);
            $('#info_act_name span').text(row.act);
            if (row.subAct) {
                $('#info_sub_name').text(row.subAct);
                $('#info_sub_name_container').removeClass('d-none');
            } else {
                $('#info_sub_name_container').addClass('d-none');
            }
            $('#info_type').text(row.type);
            $('#info_source').text(row.source);

            $('#info_allocated').text(Number(row.allocated).toLocaleString('en-US', { minimumFractionDigits: 2 }));
            $('#info_spent').text(Number(row.spent).toLocaleString('en-US', { minimumFractionDigits: 2 }));

            $('#allocInfoBox').attr('data-id', row.id).removeClass('d-none');
            SELECTED_ALLOC_ROW = row;
        } else {
            $('#allocInfoBox').addClass('d-none');
            SELECTED_ALLOC_ROW = null;
        }
    }

    function submitNewAllocation() {
        if (!SELECTED_ALLOC_ROW) { Swal.fire('เตือน', 'กรุณาเลือกโครงการ', 'warning'); return; }
        var amount = parseFloat($('#fAllocAmount').val());
        if (!amount || amount <= 0) { Swal.fire('เตือน', 'กรุณาระบุจำนวนเงินจัดสรรให้ถูกต้อง', 'warning'); return; }

        var payload = {
            id: SELECTED_ALLOC_ROW.id,
            fullData: { activity: SELECTED_ALLOC_ROW.act, subActivity: SELECTED_ALLOC_ROW.subAct },
            currentAlloc: amount,
            date: $('#fAllocDate').val(),
            letterNo: $('#fAllocLetter').val(),
            remark: $('#fAllocRemark').val()
        };

        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
        google.script.run.withSuccessHandler(function (res) {
            if (res.status === 'success') {
                Swal.fire('สำเร็จ', res.message, 'success');
                bootstrap.Modal.getInstance(document.getElementById('allocModal')).hide();
                refreshMasterData();
                loadAllocHistory();
                loadDashboardData();
            } else {
                Swal.fire('Error', res.message, 'error');
            }
        }).saveAllocation(payload);
    }

    // ==========================================
    // 📌 ฟังก์ชันปลดล็อกตัวกรองแบบลดหลั่น (Cascading Dropdown) 
    // สำหรับหน้าประวัติเบิกจ่าย (searchTx) และ ประวัติเงินยืม (searchLoan)
    // ==========================================
    function onCascadingChange(type, level) {
        // type จะมีค่าเป็น 'searchTx' หรือ 'searchLoan'
        let prefix = '#' + type;

        let orderSel = $(prefix + 'Order');
        let projSel = $(prefix + 'Proj');
        let actSel = $(prefix + 'Act');
        let subSel = $(prefix + 'Sub');

        let orderVal = orderSel.val();

        // 🟢 1. เมื่อเปลี่ยน "ลำดับโครงการ" -> ปลดล็อก "ชื่อโครงการ"
        if (level === 'order') {
            projSel.empty().append('<option value="">-- เลือกโครงการ --</option>');
            actSel.empty().append('<option value="">-- เลือกกิจกรรม --</option>').val(null).trigger('change').prop('disabled', true);
            if (subSel.length) subSel.empty().append('<option value="">-- เลือกกิจกรรมย่อย --</option>').val(null).trigger('change').prop('disabled', true);

            if (!orderVal) { projSel.val(null).trigger('change').prop('disabled', true); return; }

            let rows = CACHED_OPTIONS.filter(r => String(r.order) === String(orderVal));
            let projects = [...new Set(rows.map(r => r.proj))].sort();
            projects.forEach(p => projSel.append(new Option(p, p)));
            projSel.prop('disabled', false); // ปลดล็อก!
        }
        // 🟢 2. เมื่อเปลี่ยน "ชื่อโครงการ" -> ปลดล็อก "กิจกรรมหลัก"
        else if (level === 'proj') {
            let projVal = projSel.val();
            actSel.empty().append('<option value="">-- เลือกกิจกรรม --</option>');
            if (subSel.length) subSel.empty().append('<option value="">-- เลือกกิจกรรมย่อย --</option>').val(null).trigger('change').prop('disabled', true);

            if (!projVal) { actSel.val(null).trigger('change').prop('disabled', true); return; }

            let rows = CACHED_OPTIONS.filter(r => String(r.order) === String(orderVal) && r.proj === projVal);
            let acts = [...new Set(rows.map(r => r.act))].sort();
            acts.forEach(a => actSel.append(new Option(a, a)));
            actSel.prop('disabled', false); // ปลดล็อก!
        }
        // 🟢 3. เมื่อเปลี่ยน "กิจกรรมหลัก" -> ปลดล็อก "กิจกรรมย่อย"
        else if (level === 'act') {
            let projVal = projSel.val();
            let actVal = actSel.val();

            if (subSel.length) {
                subSel.empty().append('<option value="">-- เลือกกิจกรรมย่อย --</option>');
                if (!actVal) { subSel.val(null).trigger('change').prop('disabled', true); return; }

                let rows = CACHED_OPTIONS.filter(r => String(r.order) === String(orderVal) && r.proj === projVal && r.act === actVal);
                // 🌟 ใช้ตัวแปร subAct ให้ตรงกับหลังบ้าน
                let subs = [...new Set(rows.map(r => r.subAct).filter(s => s && String(s).trim() !== ""))].sort();

                if (subs.length > 0) {
                    subs.forEach(s => subSel.append(new Option(s, s)));
                    subSel.prop('disabled', false); // ปลดล็อก!
                } else {
                    subSel.prop('disabled', true);
                }
            }
        }
    }

    // ==========================================
    // 📌 ฟังก์ชันสร้างตารางสืบค้นแบบจัดกลุ่ม (Grouped Layout)
    // ==========================================
    function buildGroupedSearchTableRows(list) {
        if (!list || list.length === 0) {
            return '<tr><td colspan="15" class="text-center text-muted py-4">ไม่พบข้อมูล</td></tr>';
        }

        // 1. จัดกลุ่มข้อมูลโดยใช้ "ชื่อโครงการ" เป็นกุญแจหลัก
        var grouped = {};
        list.forEach(function (item) {
            var pName = item.project || 'ไม่ระบุชื่อโครงการ';
            if (!grouped[pName]) {
                grouped[pName] = {
                    type: item.type || item.budgetType || '',
                    source: item.budgetSource || item.source || '',
                    dept: item.dept || '',
                    items: []
                };
            }
            grouped[pName].items.push(item);
        });

        var html = '';
        var count = 1;
        var fmt = function (val) { return Number(val || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); };

        // 2. วนลูปวาด HTML ตามกลุ่ม
        for (var pName in grouped) {
            var g = grouped[pName];

            // วาดป้าย Badge
            var badgeType = g.type ? '<span class="badge bg-primary me-1">' + g.type + '</span>' : '';
            var badgeSource = g.source ? '<span class="badge bg-secondary me-1">' + g.source + '</span>' : '';

            // 🌟 วาดแถวหัวหน้ากลุ่ม (ชื่อโครงการ)
            html += '<tr class="table-light">';
            html += '  <td class="text-center fw-bold align-middle text-muted">' + (count++) + '</td>';
            html += '  <td colspan="10">'; // หมายเหตุ: colspan คลุมทั้งตาราง เจ้านายสามารถปรับตัวเลข 10 ให้ตรงกับจำนวนคอลัมน์จริงได้ครับ
            html += '    <div class="mb-1">' + badgeType + ' ' + badgeSource + '</div>';
            html += '    <div class="text-primary fw-bold" style="font-size: 1.05rem;">' + pName + '</div>';
            html += '  </td>';
            html += '</tr>';

            // 🌟 วาดแถวลูกน้อง (กิจกรรมหลัก และ กิจกรรมย่อย)
            g.items.forEach(function (act) {
                var mainAct = act.activity || act.act || '-';
                var subAct = act.subActivity || act.subAct || '';
                var subHtml = '';

                // ตรวจจับและแยกข้อมูล กรณีหลังบ้านรวมกิจกรรมหลักและย่อยมาในตัวแปรเดียว (มีวงเล็บ)
                if (mainAct.indexOf('(') > -1 && subAct === '') {
                    var parts = mainAct.split('(');
                    mainAct = parts[0].trim();
                    subAct = '(' + parts[1];
                }

                if (subAct && subAct !== '') {
                    subHtml = '<div class="text-muted small mt-1 ms-4"><i class="fas fa-level-up-alt fa-rotate-90 me-2"></i>' + subAct + '</div>';
                }

                html += '<tr>';
                html += '  <td></td>'; // เว้นว่างคอลัมน์ลำดับ
                html += '  <td>';
                html += '    <div class="ms-3 text-dark"><i class="fas fa-level-up-alt fa-rotate-90 me-2 text-muted"></i>' + mainAct + '</div>';
                html += '    ' + subHtml;
                html += '  </td>';

                // หมายเหตุ: บรรทัด <td> ด้านล่างนี้ จัดเรียงไว้ตามมาตรฐาน (กลุ่มงาน, จัดสรร, เบิกจ่าย, คงเหลือ) 
                // เจ้านายต้องปรับจำนวน <td> ให้ตรงกับ <thead> หน้าเว็บจริงครับ
                html += '  <td class="text-center align-middle">' + (act.dept || g.dept) + '</td>';
                html += '  <td class="text-end align-middle fw-bold">' + fmt(act.allocated) + '</td>';
                html += '  <td class="text-end align-middle text-success fw-bold">' + fmt(act.spent) + '</td>';
                html += '  <td class="text-end align-middle text-primary fw-bold">' + fmt(act.balance) + '</td>';
                html += '</tr>';
            });
        }

        return html;
    }

</script>
