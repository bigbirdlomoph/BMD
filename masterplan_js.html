<script>
    // ==========================================
    // 📌 MASTER PLAN V.3.0 (Data Sync + 15 Fields + Auto Refresh)
    // ==========================================

    window.globalMasterPlanData = [];
    let dtMasterPlan = null;

    // 1️⃣ ดึงข้อมูลจากหลังบ้าน
    function loadMasterPlanData() {
        if (typeof Swal !== 'undefined') Swal.fire({ title: 'กำลังโหลดข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

        google.script.run.withSuccessHandler(function (data) {
            try {
                if (data && data.error) {
                    if (typeof Swal !== 'undefined') Swal.fire('Error จากหลังบ้าน', data.error, 'error');
                    return;
                }

                // 🌟 อัปเดตตัวแปร Global ทันที
                globalMasterPlanData = data;
                if (typeof CACHED_OPTIONS !== 'undefined') CACHED_OPTIONS = data; // อัปเดต Cache หน้าบ้านด้วย

                populateMasterPlanFilters(data);
                renderMasterPlanTable(data);
                updateMasterPlanSummary(data);

                // 🌟 [Phase 3] สั่งให้หน้า Dashboard และ Tracking อัปเดตตัวเองอัตโนมัติ (ถ้าเปิดอยู่)
                if (typeof loadSummary === 'function' && $('#summary-page').is(':visible')) loadSummary();
                if (typeof processTrackingLogic === 'function' && $('#tracking-page').is(':visible')) processTrackingLogic();

                if (typeof Swal !== 'undefined') Swal.close();
            } catch (err) {
                console.error(err);
                if (typeof Swal !== 'undefined') Swal.fire('Error การประมวลผล', 'พบข้อผิดพลาด: ' + err.message, 'error');
            }
        }).withFailureHandler(function (error) {
            if (typeof Swal !== 'undefined') Swal.fire('Error', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้: ' + error.message, 'error');
        }).getAdminMasterPlan();
    }

    function renderMasterPlanTable(data) {
        // 🔥 1. เคลียร์ DataTables เดิมทิ้ง
        if ($.fn.DataTable.isDataTable('#tableMasterPlan')) {
            $('#tableMasterPlan').DataTable().clear().destroy();
        }

        let tbody = $('#masterPlanTableBody').empty();
        let html = '';

        // 💥 2. กรองบรรทัดว่างทิ้ง
        let validData = (data || []).filter(r => r.id && String(r.id).trim() !== '' && r.proj && String(r.proj).trim() !== '');

        if (validData.length === 0) {
            html = '<tr><td colspan="9" class="text-center text-muted py-4">ไม่พบข้อมูล</td></tr>';
        } else {
            // 🗂️ 3. จัดกลุ่มข้อมูลตาม "ชื่อโครงการ"
            let grouped = {};
            validData.forEach(r => {
                let pName = String(r.proj).trim();
                if (!grouped[pName]) {
                    grouped[pName] = {
                        type: String(r.type || '').trim(),
                        source: String(r.source || '').trim(),
                        dept: String(r.dept || '-').trim(),
                        order: r.order || '-',
                        items: []
                    };
                }
                grouped[pName].items.push(r);
            });

            // 🎨 4. วนลูปวาดตารางแบบลดหลั่นชั้น (เยื้องขั้นบันได)
            for (let pName in grouped) {
                let g = grouped[pName];

                // --- Logic วาด Badge สี ---
                let typeBadgeHtml = '';
                if (g.type) {
                    let typeStyle = 'background-color: #6c757d; color: white;';
                    if (g.type.includes('สป.สธ')) typeStyle = 'background-color: #1a237e; color: white;';
                    else if (g.type.includes('เงินนอก')) typeStyle = 'background-color: #0d6efd; color: white;';
                    typeBadgeHtml = `<span class="badge fw-normal shadow-sm" style="${typeStyle}">${g.type}</span>`;
                }

                let sourceBadgeHtml = '';
                if (g.source) {
                    let sourceStyle = 'background-color: #f8f9fa; color: #6c757d; border: 1px solid #dee2e6;';
                    if (g.source.includes('เงินบำรุง สสจ.เลย')) sourceStyle = 'background-color: #e6f2ff; color: #0d6efd; border: 1px solid #99caff;';
                    sourceBadgeHtml = `<span class="badge fw-normal" style="${sourceStyle}">${g.source}</span>`;
                }
                let badgeContainer = (typeBadgeHtml || sourceBadgeHtml) ? `<div class="mb-1 d-flex gap-2 flex-wrap">${typeBadgeHtml}${sourceBadgeHtml}</div>` : '';

                // 🌟 1. วาดแถวหัวหน้ากลุ่ม (ชื่อโครงการ) - ชิดซ้ายสุด
                html += `
                <tr class="table-light">
                    <td></td> <td class="align-middle fw-bold text-muted text-center border-end"> 
                        <div class="h6 mb-0 text-dark">${g.order}</div>
                        <div class="small">${g.dept}</div>
                    </td>
                    <td class="align-middle border-end py-2"> 
                        ${badgeContainer}
                        <div class="text-primary fw-bold mt-1" style="font-size: 1.05rem;">ชื่อโครงการ : ${pName}</div>
                    </td>
                    <td></td><td></td><td></td><td></td><td></td><td></td>
                </tr>
            `;

                // 🌟 2. วาดแถวลูกน้อง (กิจกรรมหลัก/ย่อย)
                g.items.forEach(act => {
                    let mainAct = String(act.act || '').replace(/undefined/gi, '').replace(/null/gi, '').trim();
                    let subAct = String(act.subAct || act.sub || '').replace(/undefined/gi, '').replace(/null/gi, '').trim();

                    // 🎨 ปรับการเยื้อง (Indentation) ตรงนี้ครับ!
                    // กิจกรรมหลัก: เยื้องเข้ามา 1 ระดับ (ms-3)
                    let detailHtml = `<div class="text-dark ms-3"><i class="fas fa-level-up-alt fa-rotate-90 me-2 text-muted"></i>กิจกรรมหลัก : ${mainAct || '-'}</div>`;

                    // กิจกรรมย่อย: เยื้องเข้ามาอีก 2 ระดับ (ms-5 ps-3)
                    if (subAct.length > 0) {
                        detailHtml += `<div class="text-muted small mt-1 ms-5 ps-3"><i class="fas fa-level-up-alt fa-rotate-90 me-2 text-danger"></i>กิจกรรมย่อย : ${subAct}</div>`;
                    }

                    let statusHtml = '';
                    if (act.status === 'ACTIVE') statusHtml = '<span class="badge bg-success bg-opacity-10 text-success border border-success"><i class="fas fa-check-circle me-1"></i> ACTIVE</span>';
                    else if (act.status === 'INACTIVE') statusHtml = '<span class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary"><i class="fas fa-ban me-1"></i> INACTIVE</span>';
                    else if (act.status === 'REFUNDED') statusHtml = '<span class="badge bg-danger bg-opacity-10 text-danger border border-danger"><i class="fas fa-undo me-1"></i> REFUNDED</span>';

                    let btnHtml = `
                    <div class="d-flex justify-content-center gap-1">
                        <button class="btn btn-sm btn-outline-primary shadow-sm" onclick="editMasterPlan('${act.id}')" title="แก้ไข"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-outline-danger shadow-sm" onclick="deleteMasterPlan('${act.id}')" title="ลบ"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `;

                    html += `
                    <tr>
                        <td class="text-center align-middle"><input class="form-check-input mp-checkbox" type="checkbox" value="${act.id}"></td>
                        <td class="border-end"></td> 
                        <td class="align-middle border-end">${detailHtml}</td> <td class="text-end fw-bold text-success align-middle">${Number(act.allocated || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}</td>
                        <td class="text-end text-danger align-middle">${Number(act.spent || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}</td>
                        <td class="text-end text-warning align-middle">${Number(act.loan || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}</td>
                        <td class="text-end fw-bold text-primary align-middle">${Number(act.balance || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}</td>
                        <td class="text-center align-middle">${statusHtml}</td>
                        <td class="text-center align-middle">${btnHtml}</td>
                    </tr>
                `;
                });
            }
        }

        tbody.html(html);

        // 🎯 5. ตั้งค่า DataTables
        $('#tableMasterPlan').DataTable({
            responsive: true,
            "pageLength": 10,
            "lengthChange": true,
            "lengthMenu": [[10, 25, 50, 100, -1], [10, 25, 50, 100, "ทั้งหมด"]],
            "searching": true,
            "ordering": false,
            "info": true,
            "language": {
                "lengthMenu": "แสดง _MENU_ รายการ",
                "search": "ค้นหาในตาราง:",
                "paginate": { "next": "ถัดไป", "previous": "ก่อนหน้า" },
                "info": "แสดง _START_ ถึง _END_ จาก _TOTAL_ รายการ",
                "infoEmpty": "แสดง 0 รายการ",
                "infoFiltered": "(กรองจาก _MAX_ รายการ)"
            }
        });
    }

    // 3️⃣ อัปเดต Summary Cards
    function updateMasterPlanSummary(data) {
        let sumMoph = 0;
        let sumNonMoph = 0;
        let sumLoeiFund = 0;

        data.forEach(row => {
            // 1. ตรวจสอบสถานะ: ต้องเป็น ACTIVE เท่านั้น
            let currentStatus = String(row.status || '').trim().toUpperCase();
            if (currentStatus !== 'ACTIVE') return;

            let bal = Number(row.balance) || 0;
            let typeVal = String(row.type || '').trim();
            let sourceVal = String(row.source || '').trim();

            // ลบช่องว่างเพื่อป้องกันการพิมพ์ผิด หรือเว้นวรรคไม่เท่ากัน (Human Error)
            let cType = typeVal.replace(/\s+/g, '');
            let cSource = sourceVal.replace(/\s+/g, '');

            // 2. เงื่อนไข: ประเภทงบ = สป.สธ.
            if (cType === 'สป.สธ.') {
                sumMoph += bal;
            }
            // 3. เงื่อนไข: ประเภทงบ = เงินนอก สป.
            else if (cType === 'เงินนอกสป.') {
                sumNonMoph += bal;

                // 4. เงื่อนไขย่อย: แหล่งงบประมาณ = เงินบำรุง สสจ.เลย
                if (cSource === 'เงินบำรุงสสจ.เลย') {
                    sumLoeiFund += bal;
                }
            }
        });

        // 5. เงื่อนไขรวมคงเหลือทั้งระบบ: (สป.สธ. คงเหลือ) + (เงินนอก สป. รวมทั้งหมด)
        let totalBalance = sumMoph + sumNonMoph;

        // อัปเดตตัวเลขลงใน UI
        $('#sum-moph-bal').text(sumMoph.toLocaleString('en-US', { minimumFractionDigits: 2 }));
        $('#sum-nonmoph-bal').text(sumNonMoph.toLocaleString('en-US', { minimumFractionDigits: 2 }));
        $('#sum-loeifund-bal').text(sumLoeiFund.toLocaleString('en-US', { minimumFractionDigits: 2 }));
        $('#sum-total-bal').text(totalBalance.toLocaleString('en-US', { minimumFractionDigits: 2 }));
    }

    // 4️⃣ ระบบกรองข้อมูล (Filter)
    function runMasterPlanFilter() {
        let fOrder = $('#filter-order').val(); let fDept = $('#filter-dept').val();
        let fType = $('#filter-type').val(); let fSource = $('#filter-source').val();
        let fProj = $('#filter-proj').val(); let fAct = $('#filter-act').val();
        let fSub = $('#filter-sub').val(); let fStatus = $('#filter-status').val();

        let filteredData = globalMasterPlanData.filter(row => {
            let match = true;
            if (fOrder && String(row.order) !== String(fOrder)) match = false;
            if (fDept && row.dept !== fDept) match = false;
            if (fType && row.type !== fType) match = false;
            if (fSource && row.source !== fSource) match = false;
            if (fProj && row.proj !== fProj) match = false;
            if (fAct && row.act !== fAct) match = false;
            if (fSub && row.sub !== fSub) match = false;
            if (fStatus && String(row.status).trim().toUpperCase() !== fStatus) match = false;
            return match;
        });
        renderMasterPlanTable(filteredData);
        updateMasterPlanSummary(filteredData);
    }

    // 5️⃣ ล้างค่าตัวกรอง
    function resetMasterPlanFilter() {
        $('#filter-dept, #filter-type, #filter-source, #filter-order').val('').trigger('change.select2');
        $('#filter-status').val('');
        const disableAndReset = (selector) => { $(selector).empty().html('<option value="">All</option>').prop('disabled', true).select2({ theme: 'bootstrap-5' }); };
        disableAndReset('#filter-proj'); disableAndReset('#filter-act'); disableAndReset('#filter-sub');
        renderMasterPlanTable(globalMasterPlanData);
        updateMasterPlanSummary(globalMasterPlanData);
    }

    // 6️⃣ สร้างตัวเลือก Dropdown
    function populateMasterPlanFilters(data) {
        let getUnique = (dataArray, key) => [...new Set(dataArray.map(item => String(item[key] ?? '')).filter(Boolean))].sort((a, b) => {
            let na = Number(a), nb = Number(b); return (!isNaN(na) && !isNaN(nb)) ? na - nb : a.localeCompare(b);
        });
        let makeOptions = (arr) => '<option value="">All</option>' + arr.map(x => `<option value="${x}">${x}</option>`).join('');
        const disableAndReset = (selector) => { $(selector).empty().html('<option value="">All</option>').prop('disabled', true).select2({ theme: 'bootstrap-5' }); };

        $('#filter-dept').empty().html(makeOptions(getUnique(data, 'dept'))).prop('disabled', false).select2({ theme: 'bootstrap-5' });
        $('#filter-type').empty().html(makeOptions(getUnique(data, 'type'))).prop('disabled', false).select2({ theme: 'bootstrap-5' });
        $('#filter-source').empty().html(makeOptions(getUnique(data, 'source'))).prop('disabled', false).select2({ theme: 'bootstrap-5' });
        $('#filter-order').empty().html(makeOptions(getUnique(data, 'order'))).prop('disabled', false).select2({ theme: 'bootstrap-5' });

        disableAndReset('#filter-proj'); disableAndReset('#filter-act'); disableAndReset('#filter-sub');

        $('#filter-order').off('change.cascading').on('change.cascading', function () {
            let selectedOrder = $(this).val();
            disableAndReset('#filter-act'); disableAndReset('#filter-sub');
            if (selectedOrder) {
                let filteredProj = data.filter(r => String(r.order) === String(selectedOrder));
                $('#filter-proj').empty().html(makeOptions(getUnique(filteredProj, 'proj'))).prop('disabled', false).select2({ theme: 'bootstrap-5' });
            } else disableAndReset('#filter-proj');
        });

        $('#filter-proj').off('change.cascading').on('change.cascading', function () {
            let selectedOrder = $('#filter-order').val(); let selectedProj = $(this).val();
            disableAndReset('#filter-sub');
            if (selectedProj) {
                let filteredAct = data.filter(r => String(r.order) === String(selectedOrder) && r.proj === selectedProj);
                $('#filter-act').empty().html(makeOptions(getUnique(filteredAct, 'act'))).prop('disabled', false).select2({ theme: 'bootstrap-5' });
            } else disableAndReset('#filter-act');
        });

        $('#filter-act').off('change.cascading').on('change.cascading', function () {
            let selectedOrder = $('#filter-order').val(); let selectedProj = $('#filter-proj').val(); let selectedAct = $(this).val();
            if (selectedAct) {
                let filteredSub = data.filter(r => String(r.order) === String(selectedOrder) && r.proj === selectedProj && r.act === selectedAct);

                // 🌟 จุดที่แก้ไขครับ: เปลี่ยน 'sub' เป็น 'subAct' ให้ตรงกับหลังบ้าน
                $('#filter-sub').empty().html(makeOptions(getUnique(filteredSub, 'subAct'))).prop('disabled', false).select2({ theme: 'bootstrap-5' });

            } else disableAndReset('#filter-sub');
        });
    }

    // 7️⃣ ระบบ Checkbox (Bulk Action)
    function toggleAllMasterPlanCheckboxes(source) { $('.row-checkbox').prop('checked', source.checked); checkBulkActionStatus(); }
    function checkBulkActionStatus() {
        let selected = $('.row-checkbox:checked').length;
        $('#selected-count').text(selected);
        if (selected > 0) $('#bulk-action-bar').removeClass('d-none').addClass('d-flex');
        else { $('#bulk-action-bar').removeClass('d-flex').addClass('d-none'); $('#selectAllCheckbox').prop('checked', false); }
    }

    function openBulkUpdateModal() {
        let selectedIds = [];
        $('.row-checkbox:checked').each(function () { selectedIds.push($(this).val()); });
        if (selectedIds.length === 0) return;

        Swal.fire({
            title: 'เปลี่ยนสถานะหลายรายการ',
            html: `<div class="mb-3 text-start"><label class="form-label fw-bold">เลือกสถานะใหม่:</label><select id="swal-bulk-status" class="form-select border-primary fw-bold"><option value="ACTIVE" class="text-success">ACTIVE (ใช้งานปกติ)</option><option value="INACTIVE" class="text-secondary">INACTIVE (ระงับชั่วคราว)</option><option value="REFUNDED" class="text-danger">REFUNDED (ส่งคืนเงินเหลือจ่าย)</option></select></div><div class="mb-2 text-start"><label class="form-label fw-bold">หมายเหตุ (ถ้ามี):</label><input type="text" id="swal-bulk-remark" class="form-control" placeholder="ระบุสาเหตุการเปลี่ยนสถานะ..."></div>`,
            showCancelButton: true, confirmButtonText: '<i class="fas fa-save me-1"></i> ยืนยัน', cancelButtonText: 'ยกเลิก',
            preConfirm: () => { return { status: document.getElementById('swal-bulk-status').value, remark: document.getElementById('swal-bulk-remark').value } }
        }).then((result) => { if (result.isConfirmed) submitBulkUpdate(selectedIds, result.value.status, result.value.remark); });
    }

    function submitBulkUpdate(ids, newStatus, remark) {
        Swal.fire({ title: 'กำลังปรับปรุงข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
        google.script.run.withSuccessHandler(function (response) {
            if (response && response.success) {
                Swal.fire('สำเร็จ!', `อัปเดตเรียบร้อยแล้ว`, 'success');
                $('.row-checkbox').prop('checked', false); checkBulkActionStatus(); loadMasterPlanData();
            } else Swal.fire('ผิดพลาด', response ? response.message : 'Unknown Error', 'error');
        }).withFailureHandler(function (error) { Swal.fire('Error', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error'); }).submitBulkUpdate(ids, newStatus, remark);
    }

    // ==========================================
    // 📌 8️⃣ MODAL & EDIT FUNCTIONS
    // ==========================================
    function getThaiFiscalYear() {
        let d = new Date(); let currentYear = d.getFullYear() + 543;
        if (d.getMonth() + 1 >= 10) currentYear += 1;
        return currentYear;
    }

    function openAddPlanModal() {
        $('#formMasterPlan').removeClass('was-validated'); // ล้างกรอบสีแดงแจ้งเตือน
        $('#formMasterPlan')[0].reset();
        $('#p_id').val('');

        // ล้างช่องข้อมูลงบประมาณและข้อมูลใหม่
        $('#p_budget_code, #p_act_code, #p_bal, #p_approve, #p_alloc').val('');
        $('#p_opType, #p_expType, #p_expDetail, #p_projRemark').val('');

        $('.select2-modal').val(null).trigger('change');
        $('.month-chk').prop('checked', false);

        $('#p_year').val(getThaiFiscalYear());
        $('#p_status').val('ACTIVE');

        $('#planModalTitle').html('<i class="fas fa-plus-circle me-2"></i>เพิ่มโครงการใหม่');
        $('#modalMasterPlan').modal('show');
    }

    function editMasterPlan(id) {
        let row = globalMasterPlanData.find(r => String(r.id) === String(id));
        if (!row) return;

        $('#formMasterPlan').removeClass('was-validated'); // ล้างกรอบสีแดงแจ้งเตือนตอนเปิดแก้ไข
        $('#planModalTitle').html('<i class="fas fa-edit me-2"></i>แก้ไขข้อมูลโครงการ');

        // หมวด 1: ข้อมูลหลัก
        $('#p_id').val(row.id);
        $('#p_year').val(row.year || getThaiFiscalYear());
        $('#p_order').val(row.order);
        if (row.cat) $('#p_cat').val(row.cat).trigger('change');
        if (row.dept) $('#p_dept').val(row.dept).trigger('change');
        if (row.plan) $('#p_plan').val(row.plan).trigger('change');

        // หมวด 2: กิจกรรม
        $('#p_proj').val(row.proj);
        $('#p_act').val(row.act);
        $('#p_sub').val(row.sub);
        $('#p_opType').val(row.opType || '');
        $('#p_projRemark').val(row.projRemark || '');

        // หมวด 3: งบประมาณ
        if (row.type) $('#p_type').val(row.type).trigger('change');
        $('#p_source').val(row.source);
        $('#p_budget_code').val(row.budgetCode || '');
        $('#p_act_code').val(row.actCode || '');
        $('#p_expType').val(row.expType || '');
        $('#p_expDetail').val(row.expDetail || '');

        $('#p_approve').val(row.approve || '');
        $('#p_alloc').val(row.allocated || '');
        $('#p_bal').val(Number(row.balance || 0).toLocaleString('en-US', { minimumFractionDigits: 2 }));

        // หมวด 4: ระยะเวลาและสถานะ
        $('.month-chk').prop('checked', false);
        if (row.timeline && Array.isArray(row.timeline)) {
            const thaiMonths = ['ต.ค.', 'พ.ย.', 'ธ.ค.', 'ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.'];
            row.timeline.forEach((val, index) => {
                if (Number(val) === 1) {
                    $(`.month-chk[value="${thaiMonths[index]}"]`).prop('checked', true);
                }
            });
        }

        let s = String(row.status || '').trim().toUpperCase();
        if (['ACTIVE', 'INACTIVE', 'REFUNDED'].includes(s)) $('#p_status').val(s); else $('#p_status').val('ACTIVE');
        $('#p_remark').val(row.remark || '');

        $('#modalMasterPlan').modal('show');
    }

    function submitMasterPlan(e) {
        e.preventDefault();

        // 🛑 เช็คความถูกต้องของฟอร์ม (Validation)
        var form = document.getElementById('formMasterPlan');
        if (!form.checkValidity()) {
            form.classList.add('was-validated');
            Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลในช่องที่มีเครื่องหมายดอกจัน (*) สีแดงให้ครบถ้วนครับ', 'warning');
            return;
        }

        let selectedMonths = [];
        $('.month-chk:checked').each(function () { selectedMonths.push($(this).val()); });

        // แพ็กของเตรียมส่งไปหลังบ้าน
        let payload = {
            id: $('#p_id').val(),
            year: $('#p_year').val(),
            cat: $('#p_cat').val(),
            order: $('#p_order').val(),
            dept: $('#p_dept').val(),
            plan: $('#p_plan').val(),

            proj: $('#p_proj').val(),
            act: $('#p_act').val(),
            sub: $('#p_sub').val(),
            opType: $('#p_opType').val(),
            projRemark: $('#p_projRemark').val(),

            type: $('#p_type').val(),
            source: $('#p_source').val(),
            budgetCode: $('#p_budget_code').val(),
            actCode: $('#p_act_code').val(),
            expType: $('#p_expType').val(),
            expDetail: $('#p_expDetail').val(),

            approve: $('#p_approve').val(),
            allocated: $('#p_alloc').val(),

            months: selectedMonths.join(', '),
            status: $('#p_status').val(),
            remark: $('#p_remark').val()
        };

        Swal.fire({ title: 'กำลังบันทึก...', text: 'กรุณารอสักครู่', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

        if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run.withSuccessHandler(function (res) {
                if (res && res.status === 'error') {
                    Swal.fire('ผิดพลาดจากระบบหลังบ้าน', res.message, 'error');
                    return;
                }
                $('#modalMasterPlan').modal('hide');
                Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อย', 'success');
                loadMasterPlanData();
            }).withFailureHandler(function (err) {
                Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อระบบหลังบ้านได้: ' + err.message, 'error');
            }).saveMasterPlan(payload);
        }
    }

    // ==========================================
    // 📌 ตั้งค่า Modal & โหลด Dropdown
    // ==========================================
    $(document).ready(function () {
        google.script.run.withSuccessHandler(function (res) {
            if (res.error) return console.error(res.error);
            let makeOpts = arr => '<option value="">กรุณาเลือก...</option>' + arr.map(x => `<option value="${x}">${x}</option>`).join('');
            if (res.cats) $('#p_cat').html(makeOpts(res.cats));
            if (res.depts) $('#p_dept').html(makeOpts(res.depts));
            if (res.types) $('#p_type').html(makeOpts(res.types));
            if (res.plans) $('#p_plan').html(makeOpts(res.plans));
            $('.select2-modal').select2({ theme: 'bootstrap-5', dropdownParent: $('#modalMasterPlan') });
        }).getModalDropdownData();
    });

    // ==========================================
    // (ฟังก์ชัน downloadTemplate และ submitImportData คงเดิมตามที่ท่านให้มาครับ)
    // ==========================================
    function downloadTemplate() {
        const headers = ["รหัสโครงการ", "ปีงบประมาณ", "กลุ่มงาน/งาน", "โครงการ", "กิจกรรมหลัก", "กิจกรรมย่อย", "ประเภทงบ", "แหล่งงบประมาณ", "ผู้รับผิดชอบ", "รหัสงบประมาณ", "รหัสกิจกรรม", "อนุมัติตามแผน", "จัดสรร", "เดือนที่ดำเนินการ"];
        const ws = XLSX.utils.aoa_to_sheet([headers, ["(ระบบสร้างให้อัตโนมัติ)", "2569", "กลุ่มงานบริหารทั่วไป", "โครงการตัวอย่างการนำเข้าข้อมูล", "กิจกรรมหลักที่ 1", "กิจกรรมย่อยที่ 1.1", "สป.สธ.", "งบประมาณ สป.", "นายแพทย์ทดสอบ", "00112233", "A01", 150000, 150000, "ต.ค., พ.ย., ธ.ค."]]);
        ws['!cols'] = headers.map(h => ({ wch: Math.max(h.length + 8, 15) }));
        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Template_Import"); XLSX.writeFile(wb, "BMD_Import_Template.xlsx");
    }

    let validImportData = [];
    function openImportModal() { $('#importFile').val(''); $('#previewContainer').addClass('d-none'); $('#btnConfirmImport').prop('disabled', true); $('#importErrorMsg').text(''); validImportData = []; new bootstrap.Modal(document.getElementById('modalImportPlan')).show(); }
    document.getElementById('importFile').addEventListener('change', function (e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function (e) {
            try {
                const data = new Uint8Array(e.target.result); const workbook = XLSX.read(data, { type: 'array' });
                validateAndPreviewData(XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" }));
            } catch (err) { $('#importErrorMsg').text('ไม่สามารถอ่านไฟล์ได้ โปรดตรวจสอบว่าไฟล์ไม่เสีย'); }
        }; reader.readAsArrayBuffer(file);
    });

    function validateAndPreviewData(data) {
        if (data.length === 0) { $('#importErrorMsg').text('ไฟล์ว่างเปล่า'); return; }
        const headers = ["รหัสโครงการ", "ปีงบประมาณ", "กลุ่มงาน/งาน", "โครงการ", "กิจกรรมหลัก", "กิจกรรมย่อย", "ประเภทงบ", "แหล่งงบประมาณ", "ผู้รับผิดชอบ", "รหัสงบประมาณ", "รหัสกิจกรรม", "อนุมัติตามแผน", "จัดสรร", "เดือนที่ดำเนินการ"];
        let headHtml = '<tr><th class="text-center">#</th>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>'; $('#previewHead').html(headHtml);
        let bodyHtml = ''; let errorCount = 0; validImportData = [];

        data.forEach((row, index) => {
            let isRowError = false; let trHtml = '<tr><td class="text-center bg-light text-muted">' + (index + 1) + '</td>';
            if (!row['โครงการ'] && !row['กลุ่มงาน/งาน']) return;
            headers.forEach(col => {
                let val = row[col] !== undefined ? row[col] : ""; let tdClass = ""; let errorMsg = "";
                if (["ปีงบประมาณ", "กลุ่มงาน/งาน", "โครงการ", "อนุมัติตามแผน", "จัดสรร"].includes(col) && String(val).trim() === "") { tdClass = "bg-danger bg-opacity-25 border-danger"; errorMsg = "ห้ามเป็นค่าว่าง"; isRowError = true; }
                if (["อนุมัติตามแผน", "จัดสรร"].includes(col) && isNaN(val)) { tdClass = "bg-danger bg-opacity-25 border-danger"; errorMsg = "ต้องเป็นตัวเลข"; isRowError = true; }
                trHtml += tdClass ? `<td class="${tdClass}" title="${errorMsg}"><i class="fas fa-exclamation-circle text-danger"></i> ${val}</td>` : `<td>${val}</td>`;
            });
            bodyHtml += trHtml + '</tr>';
            if (isRowError) errorCount++; else validImportData.push(row);
        });

        $('#previewBody').html(bodyHtml); $('#previewContainer').removeClass('d-none');
        if (errorCount > 0) {
            $('#previewStatus').removeClass('bg-success').addClass('bg-danger').html(`<i class="fas fa-times-circle"></i> พบข้อผิดพลาด ${errorCount} แถว (ไม่อนุญาตให้นำเข้า)`);
            $('#btnConfirmImport').prop('disabled', true); validImportData = [];
        } else {
            $('#previewStatus').removeClass('bg-danger').addClass('bg-success').html(`<i class="fas fa-check-circle"></i> ข้อมูลถูกต้องทั้งหมด ${data.filter(r => r['โครงการ']).length} แถว พร้อมนำเข้า`);
            $('#btnConfirmImport').prop('disabled', false);
        }
    }

    function submitImportData() {
        if (validImportData.length === 0) return;
        Swal.fire({ title: 'ยืนยันการนำเข้า?', text: `ระบบกำลังจะนำเข้าข้อมูล ${validImportData.length} รายการ`, icon: 'question', showCancelButton: true, confirmButtonColor: '#198754', confirmButtonText: 'นำเข้าข้อมูล' }).then((result) => {
            if (result.isConfirmed) {
                $('#btnConfirmImport').prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> กำลังบันทึก...');
                Swal.fire({ title: 'กำลังนำเข้าข้อมูล...', html: 'โปรดอย่าปิดหน้าต่างนี้', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
                google.script.run.withSuccessHandler(function (res) {
                    if (res.success) {
                        $('#modalImportPlan').modal('hide'); Swal.fire('สำเร็จ!', `นำเข้าเรียบร้อย ${res.count} รายการ`, 'success'); loadMasterPlanData();
                    } else {
                        Swal.fire('เกิดข้อผิดพลาด', res.message, 'error'); $('#btnConfirmImport').prop('disabled', false).html('<i class="fas fa-check-circle me-2"></i>ยืนยันการนำเข้า');
                    }
                }).importMasterPlanBatch(validImportData);
            }
        });
    }
</script>
