<script>
// ==========================================
// FRONTEND AUTH & IDLE TIMEOUT LOGIC
// ==========================================
let currentUser = { role: 'PUBLIC', email: '', fullName: 'ผู้เยี่ยมชม', status: 'GUEST' }; 
let idleTime = 0;
const IDLE_TIMEOUT_LIMIT = 15 * 60 * 1000; // 15 นาที
let idleInterval;

$(document).ready(function() {
    // โหลดข้อมูลจาก LocalStorage ว่าเคย Login ไว้ไหม
    var savedUser = localStorage.getItem('ap_monitoring_user');
    if(savedUser) {
        currentUser = JSON.parse(savedUser);
        updateUIBasedOnRole(currentUser);
        if (currentUser.role === 'ADMIN' || currentUser.role === 'EDITOR') {
            startIdleTimer();
        }
    } else {
        updateUIBasedOnRole(currentUser);
    }
});

// เปิดหน้าต่างพิมพ์อีเมล
function performLogin() {
    new bootstrap.Modal(document.getElementById('loginModal')).show();
}

// เมื่อกดปุ่มยืนยันอีเมล
// ฟังก์ชันเมื่อกดปุ่มยืนยันอีเมล
function submitEmailLogin(e) {
    e.preventDefault();
    var email = $('#loginEmailOnly').val().trim();
    if(!email) return;

    var $btn = $('#btnLoginSubmit');
    $btn.html('<i class="fas fa-spinner fa-spin me-1"></i> กำลังตรวจสอบ...').prop('disabled', true);
    
    // 🛡️ ป้องกันระบบค้าง (ถ้าเกิน 10 วินาทีจะปลดล็อคปุ่มคืน)
    var safeTimeout = setTimeout(function() {
        $btn.html('ตรวจสอบสิทธิ์').prop('disabled', false);
        Swal.fire('ข้อผิดพลาด', 'เซิร์ฟเวอร์ไม่ตอบสนอง โปรดตรวจสอบว่าได้ Save โค้ดที่ Code.gs แล้วหรือไม่', 'error');
    }, 10000); 

    // ส่งอีเมลไปเช็คที่เซิร์ฟเวอร์
    google.script.run
        .withSuccessHandler(function(res) {
            clearTimeout(safeTimeout); // ปิดตัวจับเวลา เพราะเซิร์ฟเวอร์ตอบสนองแล้ว
            $btn.html('ตรวจสอบสิทธิ์').prop('disabled', false);
            
            if (!res) {
                Swal.fire('ข้อผิดพลาด', 'เซิร์ฟเวอร์ไม่ส่งค่าสถานะกลับมา', 'error');
                return;
            }

            if(res.status === 'success') {
                currentUser = res.user;
                localStorage.setItem('ap_monitoring_user', JSON.stringify(currentUser)); 
                
                updateUIBasedOnRole(currentUser);
                startIdleTimer();
                
                // 🛡️ วิธีปิด Modal แบบปลอดภัยที่สุด ไม่ให้ค้าง
                try { $('#loginModal').modal('hide'); } catch(ex){}
                try { bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide(); } catch(ex){}
                $('.modal-backdrop').remove(); // ล้างฉากหลังดำ
                $('body').removeClass('modal-open').css('padding-right', '');
                
                $('#loginForm')[0].reset();
                
                Swal.fire({
                    toast: true, position: 'top-end', showConfirmButton: false, timer: 3000,
                    icon: 'success', title: `ยินดีต้อนรับคุณ ${currentUser.firstName}`
                });
            } else {
                Swal.fire('ปฏิเสธการเข้าถึง', res.message, 'error');
            }
        })
        .withFailureHandler(function(err) {
            clearTimeout(safeTimeout);
            $btn.html('ตรวจสอบสิทธิ์').prop('disabled', false);
            Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้: ' + err.message, 'error');
        })
        .verifyEmailOnly(email); // <--- วิ่งไปเรียกฟังก์ชันใน Code.gs
}

function performLogout() {
    Swal.fire({
        title: 'ออกจากระบบ',
        text: "คุณต้องการปิดเซสชันและออกจากระบบใช่หรือไม่?",
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#dc3545',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'ออกจากระบบ'
    }).then((result) => {
        if (result.isConfirmed) {
            if(currentUser && currentUser.email) {
                google.script.run.logAuthAction(currentUser.email, currentUser.fullName, 'LOGOUT', 'ออกจากระบบโดยผู้ใช้');
            }
            
            clearInterval(idleInterval);
            $(document).off('mousemove keydown click scroll');
            localStorage.removeItem('ap_monitoring_user'); // ลบข้อมูลที่จำไว้
            
            currentUser = { role: 'PUBLIC', email: '', fullName: 'ผู้เยี่ยมชม', status: 'GUEST' };
            updateUIBasedOnRole(currentUser);
            switchPage('dashboard');
            
            Swal.fire({
                toast: true, position: 'top-end', showConfirmButton: false, timer: 3000,
                icon: 'info', title: 'ออกจากระบบเรียบร้อย'
            });
        }
    });
}

function updateUIBasedOnRole(user) {
    $('#auth-loading').addClass('d-none');

    if (user.status === 'ACTIVE') {
        $('#user-name-display').text(user.fullName);
        let badgeColor = user.role === 'ADMIN' ? 'bg-danger' : 'bg-warning text-dark';
        $('#user-role-badge').removeClass('bg-danger bg-warning text-dark bg-secondary').addClass(badgeColor).text(user.role);
        $('#user-badge').removeClass('d-none');
        $('#btn-logout').removeClass('d-none');
        $('#btn-login').addClass('d-none');

        $('#mobile-user-name').text(user.fullName + ` (${user.role})`);
        $('#mobile-user-badge').removeClass('d-none');
        $('#mobile-btn-logout').removeClass('d-none');
        $('#mobile-btn-login').addClass('d-none');
    } else {
        $('#user-badge').addClass('d-none');
        $('#btn-logout').addClass('d-none');
        $('#btn-login').removeClass('d-none');

        $('#mobile-user-badge').addClass('d-none');
        $('#mobile-btn-logout').addClass('d-none');
        $('#mobile-btn-login').removeClass('d-none');
    }

    if (user.role === 'EDITOR' || user.role === 'ADMIN') {
        $('#menu-transaction').removeClass('d-none');
        $('#mobile-menu-transaction').removeClass('d-none');
    } else {
        $('#menu-transaction').addClass('d-none');
        $('#mobile-menu-transaction').addClass('d-none');
    }

    // โชว์เมนู Dropdown ให้เฉพาะ ADMIN
    if (user.role === 'ADMIN') {
        $('#menu-admin-dropdown').removeClass('d-none'); // <--- เปิด Dropdown ใหม่
        $('#mobile-menu-admin').removeClass('d-none');
        
        // (บรรทัดเก่าที่ชื่อ #menu-admin หรือ #menu-masterplan ถ้ามีให้ลบทิ้งได้เลยครับ)
    } else {
        $('#menu-admin-dropdown').addClass('d-none');    // <--- ซ่อน Dropdown ใหม่
        $('#mobile-menu-admin').addClass('d-none');
    }
}

// ==========================================
// IDLE TIMEOUT SYSTEM
// ==========================================
function startIdleTimer() {
    $(document).on('mousemove keydown click scroll', function() { idleTime = 0; });
    idleInterval = setInterval(function() {
        idleTime += 1000;
        if (idleTime >= IDLE_TIMEOUT_LIMIT) triggerSessionTimeout();
    }, 1000);
}

function triggerSessionTimeout() {
    clearInterval(idleInterval);
    $(document).off('mousemove keydown click scroll'); 
    google.script.run.logAuthAction(currentUser.email, currentUser.fullName, 'SESSION_TIMEOUT', 'เซสชันหมดอายุ (15 นาที)');
    
    localStorage.removeItem('ap_monitoring_user');
    currentUser = { role: 'PUBLIC', email: '', fullName: 'ผู้เยี่ยมชม', status: 'GUEST' };
    updateUIBasedOnRole(currentUser);
    switchPage('dashboard');
    
    Swal.fire({ title: 'เซสชันหมดอายุ', text: 'ไม่ได้ใช้งานระบบเป็นเวลา 15 นาที ระบบได้ออกจากระบบอัตโนมัติ', icon: 'warning', confirmButtonColor: '#006400', confirmButtonText: 'ตกลง' });
}

// ==========================================
// ADMIN PANEL LOGIC
// ==========================================
function loadAdminUsers() {
    if (currentUser.role !== 'ADMIN') return;
    $('#userTableBody').html('<tr><td colspan="6" class="text-center py-5"><i class="fas fa-spinner fa-spin fa-2x text-muted"></i></td></tr>');
    google.script.run.withSuccessHandler(function(users) {
        if ($.fn.DataTable.isDataTable('#tableUsers')) { $('#tableUsers').DataTable().destroy(); }
        var tbody = $('#userTableBody').empty();
        users.forEach(u => {
            let roleBadge = u.role === 'ADMIN' ? 'bg-danger' : (u.role === 'EDITOR' ? 'bg-warning text-dark' : 'bg-secondary');
            let statusBadge = u.status === 'ACTIVE' ? 'bg-success' : 'bg-dark';
            tbody.append(`
                <tr>
                    <td class="ps-4 fw-bold">${u.email}</td>
                    <td>${u.firstName} ${u.lastName}</td>
                    <td><div class="small">${u.position || '-'}</div><div class="small text-muted">${u.department || '-'}</div></td>
                    <td class="text-center"><span class="badge ${roleBadge}">${u.role}</span></td>
                    <td class="text-center"><span class="badge ${statusBadge}">${u.status}</span></td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-light text-primary border-0" onclick='editUser(${JSON.stringify(u)})'><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-light text-danger border-0" onclick="deleteUserRow('${u.email}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `);
        });
        $('#tableUsers').DataTable({"pageLength": 10, "language": {"search": "ค้นหา:"}});
    }).getAllUsers();
}
function openUserModal() { $('#userForm')[0].reset(); $('#u_email').prop('readonly', false); new bootstrap.Modal(document.getElementById('userModal')).show(); }
function editUser(user) { $('#u_email').val(user.email).prop('readonly', true); $('#u_fname').val(user.firstName); $('#u_lname').val(user.lastName); $('#u_pos').val(user.position); $('#u_dept').val(user.department); $('#u_phone').val(user.phone); $('#u_role').val(user.role); $('#u_status').val(user.status); new bootstrap.Modal(document.getElementById('userModal')).show(); }
function saveUserSubmit(e) {
    e.preventDefault();
    var formData = { email: $('#u_email').val(), firstName: $('#u_fname').val(), lastName: $('#u_lname').val(), position: $('#u_pos').val(), department: $('#u_dept').val(), phone: $('#u_phone').val(), role: $('#u_role').val(), status: $('#u_status').val() };
    $('#btnSaveUser').prop('disabled', true).html('<i class="fas fa-spinner fa-spin me-2"></i>กำลังบันทึก...');
    google.script.run.withSuccessHandler(function(res) {
        $('#btnSaveUser').prop('disabled', false).html('<i class="fas fa-save me-2"></i>บันทึก');
        if(res.status === 'success') { Swal.fire('สำเร็จ', res.message, 'success'); bootstrap.Modal.getInstance(document.getElementById('userModal')).hide(); loadAdminUsers(); } else { Swal.fire('Error', res.message, 'error'); }
    }).saveUser(formData);
}
function deleteUserRow(email) {
    Swal.fire({ title: 'ยืนยันการลบ', text: `ลบผู้ใช้ ${email} ใช่หรือไม่?`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#dc3545', confirmButtonText: 'ลบ' }).then((res) => {
        if(res.isConfirmed) { Swal.showLoading(); google.script.run.withSuccessHandler(r => { if(r.status === 'success') { Swal.fire('ลบสำเร็จ', '', 'success'); loadAdminUsers(); } else { Swal.fire('Error', r.message, 'error'); } }).deleteUser(email); }
    });
}
</script>
